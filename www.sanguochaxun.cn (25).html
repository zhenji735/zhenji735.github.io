<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"STKaiti","KaiTi","楷体",serif;min-height:100vh;background:linear-gradient(135deg,#1a0a0a 0%,#2d0a0a 30%,#1a0505 100%);color:#d4b896;display:flex;justify-content:center;padding-top:20px;transition:background 0.8s ease}
body.theme-sanguo{background:linear-gradient(135deg,#1a0a0a 0%,#2d0a0a 30%,#1a0505 100%)}

#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.container{width:100%;max-width:1000px;padding:25px 20px;text-align:center;position:relative;z-index:1}
h1{font-size:46px;color:#c9a96e;text-shadow:0 0 30px rgba(201,169,110,0.3);letter-spacing:14px;font-weight:normal;margin-bottom:8px}

.book-tabs{display:flex;justify-content:center;gap:8px;margin:18px 0 12px;flex-wrap:wrap}
.book-tab{padding:10px 22px;border:1px solid rgba(201,169,110,0.35);border-radius:8px;cursor:pointer;font-size:18px;color:#8a7355;background:rgba(201,169,110,0.04);transition:all 0.3s;font-family:inherit}
.book-tab:hover,.book-tab.active{color:#c9a96e;border-color:#c9a96e;background:rgba(201,169,110,0.12)}
.nav-tabs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:10px 0}
.nav-tab{padding:6px 18px;border:1px solid rgba(201,169,110,0.25);border-radius:4px;cursor:pointer;font-size:15px;color:#6a5a45;background:transparent;transition:all 0.2s;font-family:inherit}
.nav-tab:hover,.nav-tab.active{color:#c9a96e;border-color:#c9a96e;background:rgba(201,169,110,0.08)}
.subtitle{font-size:16px;color:#8a7355;letter-spacing:4px}
.count-badge{font-size:14px;color:#6a5a45;margin-left:6px}
.search-box{max-width:420px;margin:12px auto 16px}
.search-box input{width:100%;padding:14px 20px;font-size:20px;font-family:inherit;background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.35);border-radius:10px;color:#d4b896;outline:none;transition:all 0.3s}
.search-box input:focus{border-color:#c9a96e;box-shadow:0 0 20px rgba(201,169,110,0.18)}
.search-btn{margin-top:8px;padding:10px 36px;font-size:17px;font-family:inherit;background:linear-gradient(135deg,#8a3a2a,#6a2a1a);border:1px solid #c9a96e;border-radius:8px;color:#c9a96e;cursor:pointer;letter-spacing:5px;transition:all 0.2s}
.search-btn:hover{background:linear-gradient(135deg,#9a4a3a,#7a3a2a);box-shadow:0 0 25px rgba(201,169,110,0.2)}
.result-area{margin-top:18px;min-height:40px;display:none;animation:fadeIn 0.4s ease}
.result-area.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-card{background:linear-gradient(135deg,rgba(201,169,110,0.06),rgba(201,169,110,0.02));border:1px solid rgba(201,169,110,0.2);border-radius:12px;padding:28px 26px;text-align:left}
.hero-name{font-size:30px;color:#c9a96e;margin-bottom:14px;letter-spacing:8px;text-align:center}
.hero-name .badge{display:inline-block;font-size:14px;padding:3px 12px;border:1px solid rgba(201,169,110,0.4);border-radius:5px;margin-left:10px;color:#8a7355;vertical-align:middle}
.hero-story{font-size:18px;line-height:2;color:#c4b08a;text-indent:2em}

.not-found .icon{font-size:42px;margin-bottom:10px;opacity:0.5}

.hero-list{margin-top:8px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 6px}
.hero-tag{padding:4px 12px;border:1px solid rgba(201,169,110,0.12);border-radius:4px;font-size:14px;color:#6a5a45;cursor:pointer;transition:all 0.2s;font-family:inherit;background:transparent}
.hero-tag:hover{color:#c9a96e;border-color:rgba(201,169,110,0.35);background:rgba(201,169,110,0.06)}
#soundToggle{position:fixed;top:15px;right:15px;z-index:10;padding:8px 14px;font-size:16px;font-family:inherit;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.3);border-radius:20px;color:#c9a96e;cursor:pointer;transition:all 0.3s;letter-spacing:2px}
#soundToggle:hover{background:rgba(201,169,110,0.25);box-shadow:0 0 15px rgba(201,169,110,0.2)}
@media(max-width:600px){h1{font-size:32px;letter-spacing:8px}.book-tab{font-size:15px;padding:8px 14px}}
</style>

<script>

// ====== 音效系统 ======
var soundOn=true;
var audioCtx=null;
function getAudioCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playNote(freq,duration,type,gainVal){
  if(!soundOn)return;
  try{
    var ctx=getAudioCtx();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.type=type||'sine';
    osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(gainVal||0.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+duration);
  }catch(e){}
}
function playSwitch(){
  playNote(523,0.1,'sine',0.12);
  setTimeout(function(){playNote(659,0.1,'sine',0.12)},80);
  setTimeout(function(){playNote(784,0.15,'sine',0.12)},160);
}
function playQuery(){
  playNote(784,0.08,'sine',0.1);
  setTimeout(function(){playNote(1047,0.2,'sine',0.12)},60);
}
function playNotFound(){
  playNote(300,0.15,'triangle',0.1);
  setTimeout(function(){playNote(250,0.2,'triangle',0.08)},120);
}
function playClick(){
  playNote(880,0.06,'sine',0.08);
}
document.getElementById('soundToggle').addEventListener('click',function(){
  soundOn=!soundOn;
  this.textContent=soundOn?'\uD83D\uDD0A \u97F3\u6548\u5F00':'\uD83D\uDD07 \u97F3\u6548\u5173';
  if(soundOn)playQuery();
});

// ====== 粒子背景 ======
var canvas=document.getElementById('particleCanvas');
var ctx=canvas.getContext('2d');
var particles=[];
var particleColors={
  sanguo:['rgba(201,169,110,','rgba(180,80,60,','rgba(200,100,80,'],
  shuihu:['rgba(100,160,220,','rgba(80,120,200,','rgba(60,100,180,'],
  xiyou:['rgba(220,200,80,','rgba(180,160,60,','rgba(200,180,100,'],
  honglou:['rgba(220,140,160,','rgba(200,100,140,','rgba(180,120,150,']
};
var currentTheme='sanguo';
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);resizeCanvas();
function initParticles(count){
  particles=[];
  for(var i=0;i<count;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*3+1,opacity:Math.random()*0.4+0.1,colorIdx:Math.floor(Math.random()*3)});
  }
}
function updateParticles(){
  var colors=particleColors[currentTheme]||particleColors.sanguo;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var i=0;i<particles.length;i++){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=colors[p.colorIdx]+p.opacity+')';ctx.fill();
  }
  for(var i=0;i<particles.length;i++){
    for(var j=i+1;j<particles.length;j++){
      var dx=particles[i].x-particles[j].x;
      var dy=particles[i].y-particles[j].y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=colors[0]+((1-dist/120)*0.08)+')';ctx.stroke();
      }
    }
  }
  requestAnimationFrame(updateParticles);
}
initParticles(80);updateParticles();

function setTheme(theme){currentTheme=theme;document.body.className='theme-'+theme;}

// ====== 数据 ======
var SG={"刘备": "刘备（161—223），字玄德，涿郡人。蜀汉开国皇帝，以仁义著称。三顾茅庐请出诸葛亮，联吴抗曹取得赤壁胜利，建立蜀汉。223年白帝城托孤。", "刘禅": "刘禅（207—271），字公嗣，小名阿斗，涿郡人。蜀汉后主。前期得诸葛亮辅政，后期宠信黄皓。263年魏军至成都时出降，封安乐公。\"扶不起的阿斗\"。", "刘谌": "刘谌（？—263），刘备之孙，封北地王。魏军攻蜀时力劝刘禅死战不降，刘禅出降后杀妻儿自刎于昭烈庙前。", "诸葛亮": "诸葛亮（181—234），字孔明，号卧龙，琅琊阳都人。蜀汉丞相。三顾茅庐出山，献\"隆中对\"。受托孤重任，五月渡泸深入不毛，六出祁山北伐中原。234年病逝五丈原。著《出师表》。", "诸葛瞻": "诸葛瞻（227—263），字思远，诸葛亮之子。邓艾伐蜀时战于绵竹，兵败战死。", "关羽": "关羽（？—220），字云长，河东解县人。蜀汉名将，桃园结义排行第二。白马坡斩颜良，镇荆州水淹七军，威震华夏。后败走麦城被擒杀。后世尊为\"关公\"\"关帝\"。", "关平": "关平（？—220），关羽之子（演义中为义子），随羽镇荆州。麦城突围一并被擒，在临沮被斩。", "关兴": "关兴（生卒不详），字安国，关羽次子。随诸葛亮北伐，英年早逝。", "张飞": "张飞（？—221），字翼德，涿郡人。蜀汉名将，桃园结义排行第三。长坂坡据水断桥喝退曹军。为关羽报仇伐吴时被部下张达、范强所害。", "张苞": "张苞（生卒不详），张飞之子。与关兴并称\"小关张\"，随诸葛亮北伐时坠崖身亡。", "赵云": "赵云（？—229），字子龙，常山真定人。蜀汉名将。长坂坡单骑救主，汉水之战一身是胆。谥号\"顺平侯\"。", "马超": "马超（176—222），字孟起，扶风茂陵人。蜀汉五虎上将之一。西凉马腾之子，曾杀得曹操割须弃袍。后归刘备。", "马岱": "马岱（生卒不详），马超堂弟。随超归蜀，诸葛亮死后奉杨仪命斩杀魏延。", "黄忠": "黄忠（？—220），字汉升，南阳人。蜀汉五虎上将之一。定军山之战斩杀夏侯渊，老当益壮。", "魏延": "魏延（？—234），字文长，义阳人。蜀汉名将。献\"子午谷奇谋\"未被用。诸葛亮死后与杨仪争权，被以谋反罪斩杀灭三族。", "姜维": "姜维（202—264），字伯约，天水冀县人。蜀汉名将，诸葛亮继承人。曹魏投降后九伐中原。蜀亡后假意降魏图谋复国，事败被杀。", "庞统": "庞统（179—214），字士元，号凤雏，襄阳人。与诸葛亮齐名。献计取益州，攻雒城中流矢而死。", "法正": "法正（176—220），字孝直，扶风郿人。刘备谋士，助取益州，定军山献计杀夏侯渊。", "徐庶": "徐庶（生卒不详），字元直，颍川人。刘备早期谋士，因母被曹挟持被迫投曹，\"身在曹营心在汉\"。", "马谡": "马谡（190—228），字幼常，襄阳人。诸葛亮参军。守街亭违军令被张郃击败，诸葛亮挥泪斩马谡。", "马良": "马良（187—222），字季常，马谡之兄，眉有白毛称\"白眉\"。夷陵之战中阵亡。", "王平": "王平（？—248），字子均，巴西人。原为魏将，街亭之战时劝谏马谡。后任蜀汉先锋。", "廖化": "廖化（？—264），字元俭，襄阳人。以长寿著称，经历黄巾到蜀亡。\"蜀中无大将，廖化作先锋\"。", "严颜": "严颜（生卒不详），巴郡人。原刘璋部将，张飞擒之宁死不屈，张飞释之而降。", "黄权": "黄权（？—240），字公衡，巴西人。原刘璋部下，后归刘备。夷陵之战中因退路断降魏。", "李严": "李严（？—234），字正方，南阳人。蜀汉重臣，同受托孤。因督粮不力被诸葛亮贬为庶人。", "费祎": "费祎（？—253），字文伟，江夏人。蜀汉四相之一。被魏降将郭循刺杀。", "蒋琬": "蒋琬（？—246），字公琰，零陵人。蜀汉四相之一，诸葛亮之后接掌朝政。", "董允": "董允（？—246），字休昭，南郡人。蜀汉四相之一，抑制宦官黄皓。", "向宠": "向宠（？—240），襄阳人。《出师表》赞其\"性行淑均，晓畅军事\"。", "张翼": "张翼（？—264），字伯恭，犍为人。蜀汉将领，反对姜维连年北伐。蜀亡后随姜维谋反被杀。", "夏侯霸": "夏侯霸（生卒不详），字仲权，夏侯渊之子。因司马氏专权投奔蜀汉。", "孟获": "孟获（生卒不详），南中首领。诸葛亮南征七擒七纵，最终心服归顺。", "黄皓": "黄皓（生卒不详），蜀汉宦官。刘禅宠信之，弄权乱政加速蜀亡。", "曹操": "曹操（155—220），字孟德，沛国谯人。政治家军事家文学家，曹魏奠基人。挟天子令诸侯，官渡败袁绍统一北方。追尊\"魏武帝\"。", "曹丕": "曹丕（187—226），字子桓，曹操之子。魏朝开国皇帝（魏文帝），逼汉献帝禅让。", "曹睿": "曹睿（205—239），字元仲，魏明帝。用司马懿抗诸葛亮北伐。", "曹芳": "曹芳（232—274），字兰卿，魏齐王。高平陵之变后被司马氏夺权废黜。", "曹髦": "曹髦（241—260），字彦士，魏高贵乡公。率僮仆讨司马昭被成济刺杀。\"司马昭之心路人皆知\"。", "曹奂": "曹奂（246—302），字景明，魏元帝。曹魏末代皇帝，被司马炎逼禅让。", "曹仁": "曹仁（168—223），字子孝，曹操堂弟。善于守城，官至大司马。", "曹洪": "曹洪（169—232），字子廉，曹操堂弟。荥阳之战让马救曹操。", "曹真": "曹真（？—231），字子丹，曹操养子。多次与诸葛亮交战。", "曹休": "曹休（？—228），字文烈。石亭之战被陆逊击败，羞愤而死。", "夏侯惇": "夏侯惇（？—220），字元让，曹魏名将。左眼中箭后拔矢啖睛。", "夏侯渊": "夏侯渊（？—219），字妙才。善于千里奔袭，定军山被黄忠斩杀。", "司马懿": "司马懿（179—251），字仲达，河内温县人。曹魏权臣，西晋奠基人。高平陵之变夺权。被追尊\"宣皇帝\"。", "司马师": "司马师（208—255），字子元，司马懿长子。废黜曹芳。", "司马昭": "司马昭（211—265），字子上，司马懿次子。灭蜀汉。子司马炎称帝后追尊\"文皇帝\"。", "司马炎": "司马炎（236—290），字安世，司马昭之子。晋朝开国皇帝，灭吴统一。", "张辽": "张辽（169—222），字文远，雁门人。曹魏五子良将之首。合肥之战八百骑破孙权十万。", "张郃": "张郃（？—231），字儁乂，河间人。五子良将。街亭败马谡，木门道中伏死。", "徐晃": "徐晃（？—227），字公明，杨县人。五子良将。樊城退关羽。", "于禁": "于禁（？—221），字文则，泰山人。五子良将。水淹七军降关羽晚节不保。", "乐进": "乐进（？—218），字文谦，卫国县人。五子良将，骁勇先登。", "许褚": "许褚（生卒不详），字仲康，谯县人。曹魏猛将，裸衣战马超。", "典韦": "典韦（？—197），陈留人。曹操猛将，宛城护主力战而死。", "荀彧": "荀彧（163—212），字文若，颍川人。曹操首席谋士\"吾之子房\"。反对称王被逼自杀。", "荀攸": "荀攸（157—214），字公达，荀彧之侄。曹操谋士。", "郭嘉": "郭嘉（170—207），字奉孝，颍川人。曹操谋士。献十胜十败说，英年早逝。\"奉孝死乃天亡我也\"。", "贾诩": "贾诩（147—223），字文和，武威人。三国\"毒士\"。先后效力董卓张绣后归曹。", "程昱": "程昱（141—220），字仲德，东阿人。曹操谋士，刚烈多谋。", "许攸": "许攸（？—204），字子远，南阳人。袁绍谋士，官渡叛投献乌巢计。居功被杀。", "杨修": "杨修（175—219），字德祖，华阴人。曹操主簿，恃才放旷。\"鸡肋\"事件被处死。", "庞德": "庞德（？—219），字令明。原马超部将，后归曹。樊城与关羽交战被擒不降被杀。", "邓艾": "邓艾（197—264），字士载，义阳人。灭蜀功臣，偷渡阴平直取成都。后遭诬陷被杀。", "钟会": "钟会（225—264），字士季，颍川人。与邓艾伐蜀，灭蜀后与姜维谋反被杀。", "文聘": "文聘（生卒不详），字仲业，宛县人。原刘表部将后归曹，镇守江夏。", "李典": "李典（174—209），字曼成，山阳人。合肥之战与张辽拒吴。", "曹植": "曹植（192—232），字子建，曹操之子。才高八斗，七步诗\"本是同根生\"。", "曹彰": "曹彰（？—223），字子文，曹操之子。勇猛\"黄须儿\"。", "华佗": "华佗（145—208），字元化，谯县人。神医，创麻沸散五禽戏。为曹操治头风后被杀害。", "左慈": "左慈（生卒不详），字元放，庐江人。方士，精通法术。", "蔡邕": "蔡邕（133—192），字伯喈，陈留人。文学家书法家。董卓死因叹被杀。", "祢衡": "祢衡（173—198），字正平，平原人。击鼓骂曹，后辱黄祖被斩。", "陈琳": "陈琳（？—217），字孔璋，广陵人。建安七子。为袁绍写檄骂曹，曹爱其才。", "王朗": "王朗（？—228），字景兴，东海人。曹魏司徒。演义中阵前被诸葛亮骂死。", "刘晔": "刘晔（？—234），字子阳，淮南人。曹操谋士，献霹雳车。", "满宠": "满宠（？—242），字伯宁，山阳人。曹魏名将，执法严明。", "孙坚": "孙坚（155—191），字文台，吴郡人。孙吴奠基人。讨董时先入洛阳。", "孙策": "孙策（175—200），字伯符，孙坚长子。\"小霸王\"平定江东六郡。被许贡客刺杀。", "孙权": "孙权（182—252），字仲谋，吴郡人。东吴大帝。十九岁继承基业，赤壁大破曹操。", "周瑜": "周瑜（175—210），字公瑾，庐江人。东吴大都督。赤壁火攻破曹。\"曲有误周郎顾\"。", "鲁肃": "鲁肃（172—217），字子敬，临淮人。东吴名将外交家，力主联刘抗曹。", "吕蒙": "吕蒙（178—219），字子明，汝南人。\"士别三日当刮目相看\"。白衣渡江袭荆州擒关羽。", "陆逊": "陆逊（183—245），字伯言，吴郡人。夷陵火攻败刘备。官至丞相。", "黄盖": "黄盖（生卒不详），字公覆，零陵人。赤壁献苦肉计诈降。", "甘宁": "甘宁（？—215），字兴霸，巴郡人。百骑劫曹营。少时为江贼。", "太史慈": "太史慈（166—206），字子义，东莱人。单骑突围救北海，后归孙策。", "程普": "程普（生卒不详），字德谋，右北平人。东吴三代老将。", "韩当": "韩当（？—227），字义公，辽西人。从孙坚起兵。", "周泰": "周泰（生卒不详），字幼平，九江人。多次护孙权脱险。", "凌统": "凌统（189—237），字公绩，余杭人。合肥之战护孙权突围。", "徐盛": "徐盛（生卒不详），字文向，琅琊人。东吴名将以少胜多。", "丁奉": "丁奉（？—271），字承渊，庐江人。东吴后期名将。", "诸葛瑾": "诸葛瑾（174—241），字子瑜，琅琊人。诸葛亮之兄，东吴重臣。", "张昭": "张昭（156—236），字子布，彭城人。东吴重臣。赤壁主降遭孙权责。", "顾雍": "顾雍（168—243），字元叹，吴郡人。东吴名相为相十九年。", "陆抗": "陆抗（226—274），字幼节，陆逊之子。东吴后期名将。", "诸葛恪": "诸葛恪（203—253），字元逊，诸葛瑾之子。东吴权臣后被诛。", "吕布": "吕布（？—199），字奉先，五原人。\"飞将\"，人中吕布马中赤兔。反复无常被缢杀白门楼。", "貂蝉": "貂蝉（生卒不详），王允义女，四大美人。用连环计离间董卓吕布。", "董卓": "董卓（？—192），字仲颖，陇西人。权臣废少帝焚洛阳。被吕布杀。", "袁绍": "袁绍（？—202），字本初，汝南人。四世三公，官渡被曹操败。", "袁术": "袁术（？—199），字公路。率先称帝，众叛亲离病死。", "刘表": "刘表（142—208），字景升，山阳人。荆州牧，坐拥荆州不争霸。", "刘璋": "刘璋（生卒不详），字季玉。益州牧，懦弱被刘备夺基业。", "公孙瓒": "公孙瓒（？—199），字伯珪。幽州军阀，与袁绍争北兵败自焚。", "陶谦": "陶谦（132—194），字恭祖。徐州牧，三让徐州于刘备。", "张角": "张角（？—184），巨鹿人。黄巾领袖创太平道\"苍天已死黄天当立\"。", "张宝": "张宝（？—184），张角弟，黄巾地公将军。", "张梁": "张梁（？—184），张角弟，黄巾人公将军。", "华雄": "华雄（？—190），董卓部将。关羽温酒斩华雄。", "颜良": "颜良（？—200），袁绍河北名将。被关羽斩于白马。", "文丑": "文丑（？—200），袁绍河北名将。被关羽斩于延津。", "淳于琼": "淳于琼（？—200），袁绍将守乌巢，醉酒被曹烧粮致官渡大败。", "高顺": "高顺（？—199），吕布部将统领陷阵营。不降曹被斩。", "陈宫": "陈宫（？—199），字公台。先为曹谋士后投吕，白门楼赴死。", "张绣": "张绣（？—207），宛城军阀。降复反致曹昂死，后复降。", "田丰": "田丰（？—200），字元皓，袁绍谋士。谏勿出兵被下狱，官渡败后被赐死。", "沮授": "沮授（？—200），袁绍谋士。提出挟天子令诸侯早于曹操。被俘不屈死。", "审配": "审配（？—204），字正南，袁绍谋士。邺城守城不屈被曹处死。", "张鲁": "张鲁（生卒不详），字公祺，沛国人。五斗米道首割据汉中。降曹。", "孔融": "孔融（153—208），字文举，鲁国人。建安七子，让梨主人公。讽曹被诛。", "皇甫嵩": "皇甫嵩，东汉名将，大破黄巾军。封都乡侯。", "何进": "何进，东汉大将军，何太后之兄。因诛杀宦官事泄，被十常侍杀于宫中。", "马腾": "马腾，字寿成，马援之后，马超之父。被曹操召入许都杀害。", "韩遂": "韩遂，字文约，西凉军阀。与马超联合反曹，被离间失败。", "逢纪": "逢纪，字元图，袁绍谋士。", "郭图": "郭图，字公则，袁绍谋士。好进谗言。", "李傕": "李傕，董卓部将。与郭汜攻入长安把持朝政。", "郭汜": "郭汜，董卓部将。与李傕攻入长安把持朝政。", "祝融夫人": "祝融夫人，南蛮王孟获之妻，火神祝融后裔。善使飞刀，被诸葛亮擒获。", "王允": "王允，字子师，东汉司徒。用连环计除董卓，后为李傕郭汜所杀。", "伏皇后": "伏皇后，汉献帝之妻。因谋诛曹操事泄被曹操杀害。", "汉献帝": "汉献帝刘协，东汉末代皇帝。被董卓立为帝，先后被曹操、曹丕挟持。被迫禅位。", "刘琦": "刘琦，刘表长子。被后母蔡氏排挤，后为刘备部下。", "周仓": "周仓，关羽部将，为关羽扛青龙偃月刀。忠心耿耿。", "孙尚香": "孙尚香，孙权之妹，刘备之妻。性情刚烈，后归东吴。"};
var SH={"宋江": "宋江，字公明，郓城县押司。梁山一百单八将之首，天魁星，绰号呼保义、及时雨。为人仗义疏财，深得众好汉拥戴。率梁山招安后征讨方腊，被朝廷赐毒酒身亡。", "卢俊义": "卢俊义，河北大名府富豪，天罡星，绰号玉麒麟。棍棒天下无双，被吴用设计赚上梁山，坐第二把交椅。征方腊后遭奸臣陷害，落水溺死。", "吴用": "吴用，字学究，天机星，绰号智多星。梁山军师，足智多谋。随宋江招安，征方腊后自缢于宋江墓前。", "公孙胜": "公孙胜，天闲星，绰号入云龙。蓟州道士，精通法术。助梁山破高廉。后辞别宋江归隐，善终。", "关胜": "关胜，天勇星，绰号大刀。关羽后代，使青龙偃月刀。原为蒲东巡检，后归梁山。征方腊后病逝。", "林冲": "林冲，天雄星，绰号豹子头。原为东京八十万禁军教头，因高俅陷害被逼上梁山。火并王伦。征方腊后病逝。", "秦明": "秦明，天猛星，绰号霹雳火。原为青州指挥司统制，使狼牙棒。宋江设计使之入伙梁山。征方腊时战死。", "呼延灼": "呼延灼，天威星，绰号双鞭。北宋名将呼延赞之后，使双鞭。原为汝宁郡都统制。征方腊后战死。", "花荣": "花荣，天英星，绰号小李广。神箭手，百步穿杨。原为清风寨副知寨。征方腊后自缢于宋江墓前。", "柴进": "柴进，天贵星，绰号小旋风。后周柴世宗嫡派子孙，仗义疏财。曾资助林冲、武松、宋江等人。", "李应": "李应，天富星，绰号扑天雕。独龙岗李家庄庄主。被宋江设计赚上梁山。征方腊后善终。", "朱仝": "朱仝，天满星，绰号美髯公。原为郓城县马兵都头，义释晁盖宋江。征方腊后善终。", "鲁智深": "鲁智深，天孤星，绰号花和尚。原名鲁达，三拳打死镇关西后出家。倒拔垂杨柳。征方腊后在六和寺圆寂。", "武松": "武松，天伤星，绰号行者。景阳冈打虎，醉打蒋门神，血溅鸳鸯楼。征方腊断一臂，在六和寺出家。", "董平": "董平，天立星，绰号双枪将。原为东平府兵马都监，善使双枪。征方腊时战死。", "张清": "张清，天捷星，绰号没羽箭。善用飞石打人，百发百中。原为东昌府守将。征方腊时战死。", "杨志": "杨志，天暗星，绰号青面兽。杨家将后人，失陷花石纲后落草。征方腊时病逝。", "徐宁": "徐宁，天祐星，绰号金枪手。金枪法天下无双。原为京师金枪班教头。征方腊时战死。", "索超": "索超，天空星，绰号急先锋。原为大名府留守司正牌军，性急如火。征方腊时战死。", "戴宗": "戴宗，天速星，绰号神行太保。有道术可日行八百里。原为江州押牢节级。征方腊后善终。", "刘唐": "刘唐，天异星，绰号赤发鬼。最先投奔晁盖，参与劫生辰纲。征方腊时战死。", "李逵": "李逵，天杀星，绰号黑旋风。沂州人，使两把板斧。粗鲁嗜杀但对宋江忠心。征方腊后喝宋江毒酒而死。", "史进": "史进，天微星，绰号九纹龙。身上纹九条龙，王进之徒。少华山主。征方腊时战死。", "穆弘": "穆弘，天究星，绰号没遮拦。揭阳镇恶霸。征方腊时病逝。", "雷横": "雷横，天退星，绰号插翅虎。原为郓城县步兵都头。征方腊时战死。", "李俊": "李俊，天寿星，绰号混江龙。水性极好。征方腊后远赴海外成为暹罗国主。", "阮小二": "阮小二，天剑星，绰号立地太岁。阮氏三雄之首，劫生辰纲上梁山。征方腊时战死。", "张横": "张横，天平星，绰号船火儿。浔阳江上船夫。征方腊时病逝。", "阮小五": "阮小五，天罪星，绰号短命二郎。阮氏三雄老二。征方腊时战死。", "张顺": "张顺，天损星，绰号浪里白条。水性天下无双。征方腊时杭州涌金门被乱箭射死。", "阮小七": "阮小七，天败星，绰号活阎罗。阮氏三雄老三。征方腊后善终。", "杨雄": "杨雄，天牢星，绰号病关索。原为蓟州两院押狱，因妻潘巧云通奸怒杀之。", "石秀": "石秀，天慧星，绰号拚命三郎。助杨雄捉奸后同上梁山。征方腊时战死。", "解珍": "解珍，天暴星，绰号两头蛇。登州猎户，越狱上梁山。征方腊时战死。", "解宝": "解宝，天哭星，绰号双尾蝎。解珍之弟。征方腊时战死。", "燕青": "燕青，天巧星，绰号浪子。卢俊义心腹仆人，多才多艺善相扑。征方腊后独自远走高飞。", "朱武": "朱武，地魁星，绰号神机军师。少华山主，精通阵法。征方腊后善终。", "黄信": "黄信，地煞星，绰号镇三山。青州兵马都监，秦明之徒。征方腊后善终。", "孙立": "孙立，地勇星，绰号病尉迟。登州兵马提辖。征方腊后善终。", "宣赞": "宣赞，地杰星，绰号丑郡马。连珠箭有万夫不当之勇。征方腊时战死。", "郝思文": "郝思文，地雄星，绰号井木犴。关胜义弟。征方腊时被俘不屈而死。", "韩滔": "韩滔，地威星，绰号百胜将。原为陈州团练使。征方腊时战死。", "彭玘": "彭玘，地英星，绰号天目将。原为颍州团练使。征方腊时战死。", "单廷珪": "单廷珪，地奇星，绰号圣水将。善用水攻。征方腊时战死。", "魏定国": "魏定国，地猛星，绰号神火将。善用火攻。征方腊时战死。", "萧让": "萧让，地文星，绰号圣手书生。书法名家，善模仿字体。征方腊后善终。", "裴宣": "裴宣，地正星，绰号铁面孔目。执法公正。征方腊后善终。", "欧鹏": "欧鹏，地辟星，绰号摩云金翅。黄门山好汉。征方腊时战死。", "邓飞": "邓飞，地阖星，绰号火眼狻猊。饮马川好汉。征方腊时战死。", "燕顺": "燕顺，地强星，绰号锦毛虎。清风山寨主。征方腊时战死。", "杨林": "杨林，地暗星，绰号锦豹子。征方腊后善终。", "凌振": "凌振，地轴星，绰号轰天雷。宋朝火炮专家。征方腊后善终。", "蒋敬": "蒋敬，地会星，绰号神算子。梁山钱粮总管。征方腊后善终。", "吕方": "吕方，地佐星，绰号小温侯。使方天画戟。征方腊时战死。", "郭盛": "郭盛，地佑星，绰号赛仁贵。使方天画戟。征方腊时战死。", "安道全": "安道全，地灵星，绰号神医。医术高超。征方腊后被封为太医。", "皇甫端": "皇甫端，地兽星，绰号紫髯伯。东昌府兽医，张清好友，善相马医马。入梁山后排第五十七位，掌管医兽马匹。征方腊前被宋徽宗留用，受封御马监大使。", "王英": "王英，地微星，绰号矮脚虎。身材矮小好色，娶扈三娘。征方腊时战死。", "扈三娘": "扈三娘，地慧星，绰号一丈青。扈家庄女将，被宋江做主嫁王英。征方腊时战死。", "鲍旭": "鲍旭，地暴星，绰号丧门神。枯树山寨主。征方腊时战死。", "樊瑞": "樊瑞，地然星，绰号混世魔王。会法术，拜公孙胜为师。征方腊后善终。", "孔明": "孔明，地猖星，绰号毛头星。宋江之徒。征方腊时病逝。", "孔亮": "孔亮，地狂星，绰号独火星。孔明之弟，宋江之徒。白虎山好汉。排第六十三位。征方腊时战死。", "项充": "项充，地飞星，绰号八臂哪吒。使团牌飞刀。征方腊时战死。", "李衮": "李衮，地走星，绰号飞天大圣。芒砀山好汉，使团牌标枪。排第六十五位。征方腊时战死。", "金大坚": "金大坚，地巧星，绰号玉臂匠。雕刻名家。征方腊后善终。", "马麟": "马麟，地明星，绰号铁笛仙。善吹铁笛，使大滚刀。黄门山好汉。排第六十七位。征方腊时战死。", "童威": "童威，地进星，绰号出洞蛟。随李俊远赴海外。", "童猛": "童猛，地退星，绰号翻江蜃。童威之弟。随李俊远赴海外。", "孟康": "孟康，地満星，绰号玉幡竿。善造船只。排第七十位。征方腊时被炮石打死。", "侯健": "侯健，地遂星，绰号通臂猿。裁缝高手，薛永之徒，曾为宋江缝制衣甲。排第七十一位。征方腊时死于乱军。", "陈达": "陈达，地周星，绰号跳涧虎。少华山好汉，与朱武、杨春结义。排第七十二位。征方腊时战死。", "杨春": "杨春，地隐星，绰号白花蛇。少华山好汉，与朱武、陈达结义。排第七十三位。征方腊时战死。", "郑天寿": "郑天寿，地异星，绰号白面郎君。清风山好汉，与燕顺、王英共同打劫。排第七十四位。征方腊时战死。", "陶宗旺": "陶宗旺，地理星，绰号九尾龟。庄家户出身，使铁锹。黄门山好汉。排第七十五位。征方腊时战死。", "宋清": "宋清，地俊星，绰号铁扇子。宋江之弟，随兄上梁山，掌管排设筵席。排第七十六位。征方腊后善终，袭封爵位。", "乐和": "乐和，地乐星，绰号铁叫子。善歌唱。征方腊后善终。", "龚旺": "龚旺，地捷星，绰号花项虎。东昌府副将，张清部将。使飞枪，身上有虎纹刺青。排第七十八位。征方腊时战死。", "丁得孙": "丁得孙，地速星，绰号中箭虎。东昌府副将，张清部将。使飞叉。排第七十九位。征方腊时被毒蛇咬死。", "穆春": "穆春，地镇星，绰号小遮拦。穆弘之弟，揭阳镇恶霸。排第八十位。征方腊后善终。", "曹正": "曹正，地稽星，绰号操刀鬼。屠户出身，林冲之徒。随鲁智深上二龙山。排第八十一位。征方腊时战死。", "宋万": "宋万，地魔星，绰号云里金刚。梁山元老，最早随王伦占山为王，后归晁盖、宋江。排第八十二位，为步军将校。征方腊时战死。", "杜迁": "杜迁，地妖星，绰号摸着天。梁山第一位好汉，与王伦、宋万最早占据梁山。排第八十三位，步军将校。征方腊时战死。", "薛永": "薛永，地幽星，绰号病大虫。卖艺为生，宋江被擒时解囊相助。排第八十四位。征方腊时战死。", "施恩": "施恩，地伏星，绰号金眼彪。孟州小管营，武松结拜兄弟。排第八十五位。征方腊时落水溺死。", "李忠": "李忠，地僻星，绰号打虎将。使枪棒卖药，史进开手师父。桃花山好汉。排第八十六位。征方腊时战死。", "周通": "周通，地空星，绰号小霸王。桃花山寨主。排第八十七位。征方腊时战死。", "汤隆": "汤隆，地孤星，绰号金钱豹子。铁匠出身，李逵同乡。打造钩镰枪助破连环马。排第八十八位。征方腊时战死。", "杜兴": "杜兴，地全星，绰号鬼脸儿。李应府上主管，因面容狰狞得名。排第八十九位。征方腊后善终。", "邹渊": "邹渊，地短星，绰号出林龙。登云山寨主，与孙立等勾结劫牢反登州。排第九十位。征方腊时战死。", "邹润": "邹润，地角星，绰号独角龙。登云山寨主邹渊之侄，因头上长瘤得名。排第九十一位。征方腊后善终。", "朱贵": "朱贵，地囚星，绰号旱地忽律。梁山元老，开酒店打探消息。征方腊时病逝。", "朱富": "朱富，地藏星，绰号笑面虎。朱贵之弟，沂水县开酒店。用麻药救李逵。排第九十三位。征方腊时病逝。", "蔡福": "蔡福，地平星，绰号铁臂膊。大名府押牢节级，曾私放卢俊义。排第九十四位。征方腊时战死。", "蔡庆": "蔡庆，地损星，绰号一枝花。蔡福之弟，大名府押狱。喜戴花。排第九十五位。征方腊后善终。", "李立": "李立，地奴星，绰号催命判官。揭阳岭开黑店，与李俊为友。排第九十六位。征方腊时战死。", "李云": "李云，地察星，绰号青眼虎。原沂水县都头，李逵的同乡。排第九十七位。征方腊时战死。", "焦挺": "焦挺，地恶星，绰号没面目。祖传相扑高手，路遇李逵被打翻后归梁山。排第九十八位。征方腊时战死。", "石勇": "石勇，地丑星，绰号石将军。放赌出身，曾替宋江送信。排第九十九位。征方腊时战死。", "孙新": "孙新，地数星，绰号小尉迟。登州军官，孙立之弟。征方腊后善终。", "顾大嫂": "顾大嫂，地阴星，绰号母大虫。孙新之妻，女将。征方腊后善终。", "张青": "张青，地刑星，绰号菜园子。十字坡开黑店，武松结拜兄弟。排第一百零二位。征方腊时战死。", "孙二娘": "孙二娘，地壮星，绰号母夜叉。张青之妻。征方腊时战死。", "王定六": "王定六，地劣星，绰号活闪婆。扬子江边酒店主。排第一百零四位。征方腊时战死。", "郁保四": "郁保四，地健星，绰号险道神。身长一丈，腰阔数围，曾盗马被擒后归梁山。排第一百零五位，掌管帅字旗。征方腊时战死。", "白胜": "白胜，地耗星，绰号白日鼠。闲汉出身，参与劫生辰纲后被捕。排第一百零六位。征方腊时病逝。", "时迁": "时迁，地贼星，绰号鼓上蚤。飞檐走壁的盗贼高手。征方腊时病逝。", "段景住": "段景住，地狗星，绰号金毛犬。盗马贼出身，曾盗金国王子宝马献宋江。排第一百零八位（末位）。征方腊时战死。", "高俅": "高俅，北宋太尉，水浒第一奸臣。原是市井无赖，因踢得一脚好球被端王（宋徽宗）赏识官至太尉。逼得林冲家破人亡。", "蔡京": "蔡京，北宋太师，天字第一号奸臣。多次陷害梁山好汉。", "童贯": "童贯，北宋枢密使，太监出身。曾征讨梁山失败。", "宋徽宗": "宋徽宗赵佶，北宋皇帝。喜爱书画风流，宠信高俅蔡京等奸臣。后被金兵俘虏。", "王进": "王进，八十万禁军教头。因高俅报复携母逃亡，在史家庄传艺史进。", "史太公": "史太公，史进之父，史家庄庄主。", "林冲娘子": "林冲娘子张氏，林冲之妻。被高衙内调戏，林冲被逼上梁山后自缢身亡。", "金翠莲": "金翠莲，被镇关西郑屠强占后又赶出。鲁智深为救她三拳打死镇关西。", "郑屠": "郑屠，镇关西屠户。强占金翠莲，被鲁智深三拳打死。", "潘金莲": "潘金莲，武大郎之妻。与西门庆通奸，毒杀亲夫。后被武松杀死。", "西门庆": "西门庆，阳谷县富户。与潘金莲通奸毒杀武大郎，被武松杀死。", "武大郎": "武大郎，武松之兄，卖炊饼为生。被潘金莲和西门庆害死。", "潘巧云": "潘巧云，杨雄之妻。与和尚裴如海通奸，被杨雄石秀杀死。", "阎婆惜": "阎婆惜，宋江外室。与张文远通奸，以梁山书信要挟宋江，被宋江怒杀。", "晁盖": "晁盖，东溪村保正，梁山泊早期领袖。智取生辰纲，被推为梁山之主。攻打曾头市时中毒箭身亡。", "卢俊义妻": "卢俊义之妻贾氏。与管家李固通奸，诬告卢俊义造反。", "李固": "李固，卢俊义管家。与卢妻贾氏通奸，霸占卢家家产。"};
var XY={"孙悟空": "孙悟空，东胜神洲傲来国花果山灵石所生，拜须菩提祖师为师，学会七十二变、筋斗云。大闹天宫，被如来压五行山下五百年。后保唐僧西天取经，历经九九八十一难，修成正果，被封为斗战胜佛。嫉恶如仇，机智勇敢，是全书最核心的角色。", "唐僧": "唐僧，俗姓陈，名江流，法号玄奘，号三藏。如来佛祖二弟子金蝉子转世。奉唐太宗之命前往西天取经，收孙悟空、猪八戒、沙僧、白龙马为徒。心地善良但优柔寡断，常被妖怪蒙骗。历经九九八十一难，终到西天取得真经，被封为旃檀功德佛。", "猪八戒": "猪八戒，原为天蓬元帅，因调戏嫦娥被贬下凡错投猪胎。入赘高老庄为婿，后被孙悟空收服，保唐僧取经。贪吃好色，懒惰怯战，但也不乏勇猛时刻。取经成功后封为净坛使者。", "沙僧": "沙僧，原为卷帘大将，因失手打碎琉璃盏被贬下凡，在流沙河为妖吃人。被悟空收服后保唐僧取经。忠心耿耿，任劳任怨，是取经队伍中最稳重的人物。取经成功后封为金身罗汉。", "白龙马": "白龙马，西海龙王敖闰之子，因纵火烧了龙宫夜明珠被贬。后化为白马驮唐僧西行，关键时刻也曾救过唐僧。取经成功后化为八部天龙马。", "如来佛祖": "如来佛祖，即释迦牟尼佛，西天灵山大雷音寺之祖。法力无边，一手降服大闹天宫的孙悟空，策划取经大业。最终传授真经，封赏取经有功者。", "观音菩萨": "观音菩萨，南海普陀山落伽山大慈大悲救苦救难观世音菩萨。取经项目的实际组织者和监督者，为唐僧安排孙悟空三徒，多次出手解救取经人的危难。", "文殊菩萨": "文殊菩萨，四大菩萨之一，代表智慧。坐骑青狮曾下凡为妖。", "普贤菩萨": "普贤菩萨，四大菩萨之一，代表行愿。坐骑白象曾下凡为妖。", "地藏王菩萨": "地藏王菩萨，发誓地狱不空誓不成佛。掌管幽冥界。", "弥勒佛": "弥勒佛，未来佛，东来佛祖。黄眉怪是其撞钟童子所化。", "燃灯古佛": "燃灯古佛，过去佛，地位尊崇。曾指引取经事宜。", "菩提祖师": "菩提祖师，须菩提祖师，孙悟空的师父。精通儒释道三教，传授悟空七十二变、筋斗云后便不再相见，神秘莫测。", "灵吉菩萨": "灵吉菩萨，曾帮助悟空降服黄风怪，赐定风丹。", "降龙罗汉": "降龙罗汉，十八罗汉之一。", "伏虎罗汉": "伏虎罗汉，十八罗汉之一。", "阿难": "阿难尊者，如来十大弟子之一，多闻第一。", "迦叶": "迦叶尊者，如来十大弟子之一。取经时曾向唐僧索要人事（贿赂）才肯传经。", "玉皇大帝": "玉皇大帝，天庭之主，掌管三界。孙悟空大闹天宫时曾派兵征讨，后请如来降服悟空。历经一千七百五十劫，每劫十二万九千六百年。", "王母娘娘": "王母娘娘，天庭女仙之首，掌管蟠桃园。蟠桃会未邀孙悟空，引发大闹天宫。", "太上老君": "太上老君，道教始祖，兜率宫之主。炼制仙丹神器，曾收服青牛精。多次帮助取经团队，也曾被孙悟空偷吃仙丹。", "太白金星": "太白金星，玉帝近臣，主招安。多次下凡调和天庭与孙悟空之间的矛盾，建议封孙悟空为弼马温及齐天大圣。", "二郎神": "二郎神杨戬，玉帝外甥，灌江口显圣二郎真君。第三只眼，带哮天犬。曾与孙悟空大战，难分胜负。", "哪吒": "哪吒三太子，托塔李天王之子，脚踩风火轮。曾参与围剿孙悟空，后多次下界助取经人降妖。", "托塔天王": "托塔李天王李靖，天庭将领。执掌天兵天将，多次下界降妖。", "四大天王": "四大天王，天庭守门武将：增长天王、持国天王、多闻天王、广目天王。", "巨灵神": "巨灵神，天庭先锋，率先征讨孙悟空被打败。", "月老": "月老，主管人间姻缘的神仙。", "嫦娥": "嫦娥，广寒宫仙女，猪八戒因调戏她被贬。", "吴刚": "吴刚，广寒宫伐桂之人。", "赤脚大仙": "赤脚大仙，天庭神仙，赤脚行走。", "福星": "福星，福禄寿三星之一。", "禄星": "禄星，福禄寿三星之一。", "寿星": "寿星，福禄寿三星之一。", "武曲星君": "武曲星君，天庭星官，曾告知悟空弼马温一职低微。", "混世魔王": "混世魔王，孙悟空学艺归来后斩杀的第一个妖魔，占据花果山水帘洞。", "牛魔王": "牛魔王，平天大圣，孙悟空的结拜大哥。力大无穷，会七十二变。妻铁扇公主，子红孩儿。因孙悟空请天兵围剿而降，皈依佛门。", "铁扇公主": "铁扇公主罗刹女，牛魔王之妻，红孩儿之母。有芭蕉扇可扇灭火焰山大火，曾因红孩儿之事与孙悟空冲突。", "红孩儿": "红孩儿，牛魔王与铁扇公主之子，号圣婴大王。会使三昧真火，烧得悟空狼狈不堪。后被观音收服为善财童子。", "白骨精": "白骨精，白骨夫人，善于变化。三次变化为村姑、老妇、老翁欺骗唐僧，被悟空三打白骨精。", "黄袍怪": "黄袍怪，原是天上奎木狼星，下凡为妖。掳走宝象国公主百花羞，后被天庭收回。", "金角大王": "金角大王，太上老君看金炉的童子下凡为妖，携紫金红葫芦等法宝。被悟空降服。", "银角大王": "银角大王，太上老君看银炉的童子下凡为妖，与金角大王同伙。有羊脂玉净瓶等法宝。", "精细鬼": "精细鬼，金角大王部下小妖，被悟空戏耍。", "伶俐虫": "伶俐虫，金角大王部下小妖，与精细鬼搭档。", "九尾狐": "九尾狐，金角大王之母，被悟空一棒打死。", "青牛精": "青牛精，太上老君坐骑青牛下凡为妖。有金刚琢可收天下兵器，孙悟空请遍天庭神仙都无可奈何，最后老君亲自收服。", "黄风怪": "黄风怪，黄毛貂鼠精，三昧神风威力极大。被灵吉菩萨收服。", "沙僧（流沙河时期）": "沙悟净在流沙河为妖时吃人无数，脖子上挂九个人骷髅。", "六耳猕猴": "六耳猕猴，假孙悟空，与悟空一模一样，无人能辨。打到如来面前才被识破，被真悟空一棒打死。", "铁扇公主（罗刹女）": "见铁扇公主条目。", "玉面狐狸": "玉面狐狸，万岁狐王之女，牛魔王之妾。被猪八戒一耙打死。", "车迟国三妖": "车迟国三妖——虎力大仙、鹿力大仙、羊力大仙，会五雷法求雨。与唐僧赌斗，先后现出原形。", "虎力大仙": "虎力大仙，车迟国国师，黄毛虎精。与唐僧比砍头被悟空作弄而死。", "鹿力大仙": "鹿力大仙，车迟国国师，白毛鹿精。与唐僧比剖腹被悟空作弄而死。", "羊力大仙": "羊力大仙，车迟国国师，羚羊精。与唐僧比油锅洗澡被悟空作弄而死。", "通天河老鼋": "通天河老鼋，修炼千年的老鳖精。驮唐僧师徒过通天河，托唐僧问如来自己何时能脱壳成人。取经归来再次相助，发现唐僧忘记问如来而怒将其翻入河中。", "灵感大王": "灵感大王，观音菩萨莲花池里的金鱼精。在通天河吃童男童女，被观音用竹篮收服。", "青狮精": "青狮精，文殊菩萨坐骑，下凡为狮驼岭狮驼洞大王。曾大闹南天门。后被文殊收回。", "白象精": "白象精，普贤菩萨坐骑，狮驼岭二大王。鼻子威力无穷。后被普贤收回。", "大鹏金翅雕": "大鹏金翅雕，狮驼岭三大王。如来佛祖的舅舅（与如来有亲），法力高强，连悟空都不是对手。最后被如来亲自收服。", "九头虫": "九头虫，碧波潭万圣龙王的女婿。九头驸马，被二郎神和悟空联手打败后逃往北海。", "黄眉老祖": "黄眉老祖，又称黄眉大王，弥勒佛的撞钟童子下凡。设小雷音寺，有人种袋可收万物。被弥勒佛收服。", "蝎子精": "蝎子精，琵琶精。倒马毒桩连如来都戳痛过。在女儿国掳走唐僧，被卯日星官降服。", "百眼魔君": "百眼魔君，蜈蚣精。黄风岭黄花观观主，千眼金光阵威力无穷。被毗蓝婆菩萨降服。", "蜘蛛精": "蜘蛛精，盘丝洞七姐妹，能吐丝结网。后被悟空降服。", "老鼠精": "老鼠精，地涌夫人，金鼻白毛老鼠精。原是灵山上的老鼠偷吃灯油成精，拜托塔天王为义父。掳走唐僧，后被天兵降服。", "玉兔精": "玉兔精，广寒宫捣药的玉兔下凡为妖。冒充天竺国公主，被太阴星君收回。", "九灵元圣": "九灵元圣，太乙天尊的坐骑九头狮子。一声吼上通三圣下彻九泉，法力高强。后被太乙天尊收回。", "如意真仙": "如意真仙，牛魔王之弟，红孩儿之叔。霸占落胎泉。", "南山大王": "南山大王，艾叶花皮豹子精。自称南山大王，被悟空和八戒联手打死。", "小鼍龙": "小鼍龙，泾河龙王之子，西海龙王外甥。在黑水河为妖擒走唐僧，后被西海太子收服。", "赛太岁": "赛太岁，观音菩萨坐骑金毛犼下凡为妖。有紫金铃法宝，掳走朱紫国金圣宫娘娘。被观音收回。", "金毛犼": "金毛犼即赛太岁，见赛太岁条目。", "奔波儿灞": "奔波儿灞，碧波潭鲇鱼怪，九头虫部下小妖。", "灞波儿奔": "灞波儿奔，碧波潭黑鱼精，九头虫部下小妖。", "精细虫": "精细虫，黄花观蜈蚣精部下小妖。", "黑熊精": "黑熊精，黑风山黑风洞大王。偷走唐僧锦斓袈裟，后被观音收服为落伽山守山大神。", "镇元大仙": "镇元大仙，万寿山五庄观地仙之祖。有草还丹（人参果），与悟空结拜为兄弟。法力高强不亚于如来。", "人参果": "镇元大仙的灵根果树，三千年开花三千年结果三千年成熟，闻一闻能活三百六十岁。", "白骨夫人": "见白骨精条目。", "火焰山土地": "火焰山土地神，原是兜率宫守炉道人。因孙悟空踢倒八卦炉，炉砖落在此处化为火焰山。", "东海龙王": "东海龙王敖广，四海龙王之首。孙悟空的如意金箍棒即取自东海龙宫。", "南海龙王": "南海龙王敖钦。", "西海龙王": "西海龙王敖闰，白龙马之父。", "北海龙王": "北海龙王敖顺。", "泾河龙王": "泾河龙王，因与算命先生袁守诚打赌，克扣降雨点数被魏征梦中斩首。", "万圣龙王": "万圣龙王，碧波潭龙王，九头虫的后父。", "唐太宗": "唐太宗李世民，派唐僧取经。在阴间遭遇十殿阎王，后还阳大赦天下。", "魏征": "魏征，唐太宗丞相，梦中斩了泾河龙王。", "袁守诚": "袁守诚，长安城算命先生，算卦极准。与泾河龙王打赌致其被斩。", "刘全": "刘全，因妻自缢去阴间送瓜果，被封为阴间总管。", "陈光蕊": "陈光蕊，唐僧的父亲，新科状元。被水贼刘洪害死，后被龙王所救。", "殷温娇": "殷温娇，唐僧的母亲，被水贼霸占。唐僧出生后将其放入木盆顺江漂流，得金山寺长老相救。", "李世民": "见唐太宗。", "李世民（唐太宗）": "见唐太宗。", "女儿国国王": "女儿国国王，西梁女国君主。对唐僧一见钟情，欲招为夫。唐僧虽动凡心但为取经大业忍痛离去。", "琵琶洞主": "见蝎子精。", "寅将军": "寅将军，虎精。唐僧刚出长安在双叉岭遇到的第一伙妖怪，与熊山君、特处士一起吃了唐僧的两个随从。太白金星救走唐僧。", "熊山君": "熊山君，熊精。与寅将军、特处士在双叉岭吃唐僧随从。", "特处士": "特处士，野牛精。与寅将军、熊山君同为双叉岭妖。", "刘伯钦": "刘伯钦，镇山太保，猎户出身。在双叉岭打死老虎救了唐僧，护送至两界山。唐僧在此遇到孙悟空。", "乌鸡国国王": "乌鸡国国王，被文殊菩萨座下青狮精推入井中淹死三年。其鬼魂向唐僧诉冤，悟空救活他并揭穿假国王。", "井龙王": "井龙王，乌鸡国御花园井中龙王。用定颜珠保存了乌鸡国国王尸身三年不腐。", "万圣公主": "万圣公主，碧波潭万圣龙王之女，九头虫之妻。曾去大罗天上盗取王母娘娘的九叶灵芝草。", "杏仙": "杏仙，荆棘岭十八公中的杏树精，貌美多情，欲与唐僧成亲。后被八戒一钯打倒。", "十八公": "十八公，荆棘岭松树精，与唐僧吟诗作对。", "孤直公": "孤直公，荆棘岭柏树精。", "凌空子": "凌空子，荆棘岭桧树精。", "拂云叟": "拂云叟，荆棘岭竹精。", "杏仙等树精": "见杏仙、十八公。", "金圣宫娘娘": "金圣宫娘娘，朱紫国王后，被赛太岁掳走。有神仙所赐五彩仙衣护体，三年未被妖魔染指。", "紫阳真人": "紫阳真人，张紫阳。为保护金圣宫娘娘赠其五彩仙衣。", "七仙女": "盘丝洞七蜘蛛精——大蛛精、二蛛精等七姐妹（七人分别对应红橙黄绿青蓝紫七色）。", "小钻风": "小钻风，狮驼岭巡山小妖，被孙悟空假扮套出狮驼岭虚实。\"大王叫我来巡山\"的著名段子。", "犀牛精": "犀牛精，金平府青龙山玄英洞三头犀牛精——辟寒大王、辟暑大王、辟尘大王。假扮佛祖偷吃灯油。被四木禽星降服。", "辟寒大王": "辟寒大王，金平府三犀牛精之一。假扮佛像偷酥合香油。", "辟暑大王": "辟暑大王，金平府三犀牛精之一。", "辟尘大王": "辟尘大王，金平府三犀牛精之一。", "太阴星君": "太阴星君，广寒宫之主。来收回下凡为妖的玉兔精。", "布金禅寺老僧": "布金禅寺老僧，在寺中发现假冒天竺国公主的真公主。", "凤仙郡郡侯": "凤仙郡郡侯上官氏。因推倒供桌骂天致凤仙郡三年大旱。后诚心悔过，悟空上天廷求情，玉帝降旨降雨。", "四木禽星": "四木禽星——角木蛟、斗木獬、奎木狼、井木犴，天庭星官。降服金平府犀牛精。", "奎木狼": "奎木狼，二十八宿之一。即下凡为妖的黄袍怪（见黄袍怪）。", "卯日星官": "卯日星官，负责司晨的大公鸡神仙。用叫声降服了蝎子精。", "毗蓝婆菩萨": "毗蓝婆菩萨，昴日星官之母。用绣花针降服了百眼魔君（蜈蚣精）。", "昴日星官": "昴日星官，毗蓝婆菩萨之子。本相为六七尺高大公鸡，可降服蝎子精等毒物。", "太乙救苦天尊": "太乙救苦天尊，九灵元圣（九头狮子）的主人。亲自下界收回坐骑。", "张道陵": "张道陵，道教天师，天师之首。", "黄袍怪（奎木狼）": "黄袍怪即奎木狼星下凡，见黄袍怪。", "如意真仙（落胎泉）": "见如意真仙。", "南山大王（豹精）": "见南山大王。", "黄狮精": "黄狮精，九灵元圣的孙子辈。偷走了悟空八戒沙僧的兵器，并搞了一场钉耙宴。", "豹头山虎口洞": "豹头山虎口洞，黄狮精的洞府。", "灭法国国王": "灭法国国王，曾许愿杀一万个和尚，已杀了九千九百九十六个。悟空设计剃了举国上下头发，国王悔改。", "通天河老龟": "见通天河老鼋。", "寇员外": "寇员外，寇洪。斋僧万人的大善人，被强盗踢死。悟空去地府将其救活。", "铜台府刺史": "铜台府刺史，将唐僧师徒误认为劫匪抓捕。后查清真相释放。", "接引佛祖": "接引佛祖，在凌云渡撑无底船接唐僧师徒渡过最后一关，脱胎换骨。", "唐王": "见唐太宗。", "袁天罡": "袁天罡，唐代著名术士，袁守诚之侄。", "蛟魔王": "蛟魔王，覆海大圣，孙悟空结拜二哥。七大圣之一，蛟龙得道。", "鹏魔王": "鹏魔王，混天大圣，孙悟空结拜三哥。七大圣之一，大鹏鸟。", "狮驼王": "狮驼王，移山大圣，孙悟空结拜四哥。七大圣之一，青毛狮子。", "猕猴王": "猕猴王，通风大圣，孙悟空结拜五哥。七大圣之一，猕猴。", "禺狨王": "禺狨王，驱神大圣，孙悟空结拜六哥。七大圣之一，金丝猴得道。", "独角鬼王": "独角鬼王，花果山部下。拥戴孙悟空为齐天大圣。", "通臂猿猴": "通臂猿猴，花果山四老猴之一，通晓人事。", "赤尻马猴": "赤尻马猴，花果山四老猴之一，晓阴阳会人事。", "高太公": "高太公，高老庄庄主，猪八戒的后父。请孙悟空降服猪八戒。", "高翠兰": "高翠兰，高太公三女，猪八戒之妻。", "刘洪": "刘洪，水贼。害死陈光蕊，霸占殷温娇十八年。后被处决。", "乌巢禅师": "乌巢禅师，浮屠山隐居僧人。传授唐僧《心经》。", "清风": "清风，五庄观镇元大仙座下童子，看守人参果树。", "明月": "明月，五庄观镇元大仙座下童子，看守人参果树。", "百花羞": "百花羞，宝象国公主。被黄袍怪掳去做妻十三年。", "有来有去": "有来有去，赛太岁部下小妖。被孙悟空打死。"};
var HL={"贾宝玉": "贾宝玉，荣国府贾政之子，衔通灵宝玉而生。全书男主角，前身为神瑛侍者。性情温柔，厌恶仕途经济，独钟情于林黛玉。最终在家族败落后悬崖撒手，出家为僧。", "林黛玉": "林黛玉，金陵十二钗之首，字颦颦。前身为绛珠仙草，为还神瑛侍者（宝玉）的灌溉之恩下凡。才华横溢，多愁善感。与宝玉相爱却因家族反对终未能成婚，泪尽而逝。", "薛宝钗": "薛宝钗，金陵十二钗之一。薛姨妈之女，拥有金锁。端庄稳重，博学多才，深得贾府上下喜爱。最终嫁给宝玉，但宝玉出家后独守空闺。", "贾元春": "贾元春，金陵十二钗之一。贾政长女，入宫为妃。省亲时大观园即为其省亲别墅而建。最终在宫中去世（据推猜死于政治斗争）。", "贾探春": "贾探春，金陵十二钗之一。贾政庶女，精明能干，有男子之气概。曾代理管家，兴利除弊。后被远嫁海疆。", "史湘云": "史湘云，金陵十二钗之一。贾母娘家侄孙女，性格豪爽，英气勃勃，心直口快。与宝玉为好友。最终史家败落后流落。", "妙玉": "妙玉，金陵十二钗之一。出身仕宦之家，因自幼多病入空门带发修行。寄居大观园栊翠庵，孤傲洁癖。最终被强盗掳走。", "贾迎春": "贾迎春，金陵十二钗之一。贾赦之女，性格懦弱，被称为\"二木头\"。嫁与孙绍祖后受尽虐待，一年后便去世。", "贾惜春": "贾惜春，金陵十二钗之一。贾珍之妹，性格孤僻冷漠。见家族衰败后看破红尘，削发为尼。", "王熙凤": "王熙凤，金陵十二钗之一。贾琏之妻，荣国府实际管家人。精明强干，心狠手辣，人称\"凤辣子\"。弄权铁槛寺，逼死尤二姐等。最终被休后病死狱中。", "巧姐": "巧姐，金陵十二钗之一。王熙凤之女。贾府败落后险被卖入烟花之地，后被刘姥姥救出，嫁入乡间。", "李纨": "李纨，金陵十二钗之一。贾珠之妻，贾兰之母。年轻守寡，一心教子。性格温和，与世无争。最终贾兰中举后受封诰命，不久去世。", "秦可卿": "秦可卿，金陵十二钗之一。贾蓉之妻，生得袅娜纤巧兼鲜艳妩媚。因与公公贾珍有染，羞愤自缢（一说病逝）。", "贾母": "贾母，人称史太君。荣国公长子贾代善之妻，贾府最高辈分。慈祥和蔼，疼爱孙辈，是贾府的定海神针。家族败落后去世。", "贾政": "贾政，字存周。荣国府贾代善次子，贾宝玉之父。为人古板严肃，醉心仕途。对宝玉管教严厉。", "王夫人": "王夫人，贾政正妻，贾宝玉之母。王子腾之妹，薛姨妈之姐。表面慈善，实则手腕强硬。逼死金钏、晴雯等。", "贾赦": "贾赦，字恩侯。荣国府贾代善长子，袭一等将军之职。好色享乐，强纳鸳鸯为妾不成。最终被革职抄家。", "邢夫人": "邢夫人，贾赦续弦。性格懦弱，一味顺从贾赦，在贾府地位尴尬。", "贾琏": "贾琏，贾赦之子，王熙凤之夫。好色风流，偷娶尤二姐。管理荣国府外务。", "贾珍": "贾珍，宁国府贾敬之子，袭三等威烈将军。荒淫无度，与儿媳秦可卿有私情。", "尤氏": "尤氏，贾珍续弦，宁国府当家奶奶。性格软弱，对贾珍的荒唐无能为力。", "贾蓉": "贾蓉，贾珍之子，秦可卿之夫。好色，与王熙凤有暧昧。", "贾蔷": "贾蔷，宁国府近支子弟，与贾蓉关系好。管理大观园戏班。", "贾芸": "贾芸，贾府远族，认贾宝玉为父。后与小红相爱。", "贾环": "贾环，贾政庶子，探春同父异母弟。性情猥琐，嫉妒宝玉。", "贾兰": "贾兰，贾珠与李纨之子。好学上进，最终科举中第。", "贾瑞": "贾瑞，贾府远房子弟。贪恋王熙凤美色，被王熙凤设局整死。", "秦钟": "秦钟，秦可卿之弟，贾宝玉好友。白净俊秀，与智能儿有私情。后病死。", "薛蟠": "薛蟠，薛姨妈之子，薛宝钗之兄。\"呆霸王\"，打死冯渊抢走香菱。性情粗鲁。", "薛姨妈": "薛姨妈，王夫人之妹，薛家当家。携儿女进京住进贾府。", "薛宝琴": "薛宝琴，薛蝌之妹，容貌出众，贾母极为喜爱。许配梅翰林之子。", "邢岫烟": "邢岫烟，邢夫人侄女，家境贫寒。后嫁薛蝌。", "尤二姐": "尤二姐，尤氏继母之女。美貌温柔，被贾琏偷娶为妾。被王熙凤设计逼死。", "尤三姐": "尤三姐，尤二姐之妹，刚烈泼辣。钟情柳湘莲，柳湘莲因疑其不洁退婚，尤三姐自刎以明志。", "袭人": "袭人，原名花珍珠，贾宝玉大丫鬟。温柔贤淑，忠心耿耿。宝玉出家后嫁蒋玉菡。", "晴雯": "晴雯，贾宝玉丫鬟，金陵十二钗又副册之首。容貌出众，性格刚烈。被王夫人赶出大观园后病死。", "麝月": "麝月，贾宝玉丫鬟，温和稳重，被认为是袭人的影子。", "秋纹": "秋纹，贾宝玉丫鬟。", "碧痕": "碧痕，贾宝玉丫鬟，曾服侍宝玉洗澡。", "紫鹃": "紫鹃，原名鹦哥，林黛玉丫鬟。忠心耿耿，黛玉死后看破世事。", "雪雁": "雪雁，林黛玉从苏州带来的小丫鬟。", "莺儿": "莺儿，薛宝钗丫鬟。", "香菱": "香菱，原名甄英莲，甄士隐之女。自幼被拐卖，后被薛蟠纳为妾。向黛玉学诗，苦吟成痴。", "平儿": "平儿，王熙凤丫鬟兼通房丫头。善良聪慧，在凤姐和贾琏之间左右调停。", "鸳鸯": "鸳鸯，贾母大丫鬟。刚烈有志气，抗拒贾赦纳妾之命，发誓终身不嫁。贾母死后自缢。", "司棋": "司棋，贾迎春大丫鬟。与表弟潘又安相爱事发，被赶出大观园。后殉情。", "入画": "入画，贾惜春丫鬟。", "侍书": "侍书，贾探春丫鬟。", "抱琴": "抱琴，贾元春丫鬟，随元春入宫。", "小红": "小红，原名林红玉，怡红院丫鬟。伶俐有心计，后与贾芸相爱。", "坠儿": "坠儿，怡红院小丫鬟，因偷东西被晴雯赶出。", "金钏": "金钏，王夫人丫鬟。因与宝玉调笑被王夫人赶出，含羞跳井而死。", "玉钏": "玉钏，金钏之妹，后为王夫人丫鬟。", "彩云": "彩云，王夫人丫鬟，与贾环要好。", "彩霞": "彩霞，王夫人丫鬟。", "芳官": "芳官，大观园戏班正旦，后为宝玉丫鬟。性格活泼。", "藕官": "藕官，大观园戏班小生。", "蕊官": "蕊官，大观园戏班小旦。", "龄官": "龄官，大观园戏班正旦。容貌酷似黛玉，与贾蔷相恋。", "刘姥姥": "刘姥姥，乡下老妇。因女婿王狗儿与王家有旧，三进荣国府。幽默诙谐，深得贾母欢心。贾府败落后救出巧姐。", "赖大": "赖大，荣国府大管家。", "赖嬷嬷": "赖嬷嬷，赖大之母，贾府老仆。", "林之孝": "林之孝，荣国府管家，小红之父。", "林之孝家的": "林之孝之妻，荣国府女管家。", "周瑞": "周瑞，荣国府管家。", "周瑞家的": "周瑞之妻，王夫人陪房。", "吴新登": "吴新登，荣国府账房总管。", "焦大": "焦大，宁国府老仆。从小跟宁国公打仗，曾救过主子性命。因醉酒骂主被塞了一嘴马粪。", "王善保家的": "王善保家的，邢夫人陪房。抄检大观园的主谋之一。", "柳嫂子": "柳嫂子，大观园厨房女厨。", "甄士隐": "甄士隐，乡绅，甄英莲（香菱）之父。爱女被拐、家宅被烧后遭世态炎凉，随跛足道人出家。", "贾雨村": "贾雨村，穷书生出身，后中进士做官。曾为林黛玉之师，帮助贾府处理官司。忘恩负义，贾府败落后落井下石。", "林如海": "林如海，林黛玉之父，巡盐御史。病逝扬州。", "甄宝玉": "甄宝玉，金陵甄家之子，与贾宝玉同名同貌，性格却完全相反，醉心功名。", "北静王": "北静王水溶，贾府世交。赠送宝玉鹡鸰香串。", "柳湘莲": "柳湘莲，世家子弟，性格豪爽文武双全。与尤三姐定亲后退婚，三姐自刎后出家。", "蒋玉菡": "蒋玉菡，戏子，艺名琪官。与宝玉互赠汗巾。后娶袭人为妻。", "贾敬": "贾敬，宁国府贾代化之子，贾珍之父。一心想成仙，在玄真观烧丹炼汞而死。", "贾代儒": "贾代儒，贾府族中塾师，贾瑞之祖父。", "马道婆": "马道婆，巫婆。受赵姨娘之托用魇魔法害宝玉和王熙凤。", "赵姨娘": "赵姨娘，贾政之妾，探春、贾环之母。阴险毒辣，指使马道婆害宝玉凤姐。", "甄士隐（二）": "见甄士隐。", "冷子兴": "冷子兴，古董商，周瑞女婿。演说荣国府。", "门子": "门子，应天府小吏，原为葫芦庙小沙弥。为贾雨村出主意处理薛蟠案。", "跛足道人": "跛足道人，癞头和尚的搭档。度化甄士隐和柳湘莲出家。", "癞头和尚": "癞头和尚，蓬头垢面却非凡人。曾想度化黛玉出家，给宝钗金锁配吉利话。", "空空道人": "空空道人，将《石头记》抄录传世。见大荒山无稽崖青埂峰下石头所记故事，录之曰《红楼梦》。", "警幻仙姑": "警幻仙姑，太虚幻境之主。曾带贾宝玉游历太虚幻境，展示金陵十二钗判词。", "贾芹": "贾芹，贾府远族，管理大观园小道士小尼姑。", "贾敷": "贾敷，贾代化长子，早夭。", "贾代善": "贾代善，荣国公之子，贾母之夫。已故。", "贾代化": "贾代化，宁国府贾演之子，贾敬之父。", "贾演": "贾演，宁国公，宁国府始祖。", "贾源": "贾源，荣国公，荣国府始祖。", "贾菌": "贾菌，贾府远族，贾兰塾中同窗。", "王仁": "王仁，王熙凤之兄。巧姐的舅舅，品行恶劣。", "王子腾": "王子腾，王夫人薛姨妈之兄，京营节度使。四大家族核心人物。", "乌进孝": "乌进孝，宁国府皇粮庄头，每年进贡。", "张道士": "张道士，荣国公替身（代出家道士），贾府老关系。", "智能儿": "智能儿，馒头庵小尼姑，与秦钟有私情。", "净虚": "净虚，馒头庵老尼。求王熙凤拆散张金哥婚事，王熙凤弄权铁槛寺便由此起。", "夏金桂": "夏金桂，薛蟠之妻。河东狮，泼辣善妒。欲毒死香菱反毒死自己。", "秋桐": "秋桐，贾琏之妾，原是贾赦房中人。与王熙凤合谋欺辱尤二姐。", "鲍二家的": "鲍二家的，贾府仆妇。与贾琏私通被王熙凤撞见，后羞愤自缢。", "多姑娘": "多姑娘，贾府女仆。晴雯的表嫂，容貌风流。", "赵国基": "赵国基，赵姨娘之弟，贾环之舅。", "贾琮": "贾琮，贾赦之子，年幼。", "焙茗": "焙茗，贾宝玉贴身小厮。", "锄药": "锄药，贾宝玉小厮。", "墨雨": "墨雨，贾宝玉小厮。", "扫红": "扫红，贾宝玉小厮。", "双瑞": "双瑞，贾宝玉小厮。", "李贵": "李贵，贾宝玉奶兄，伴读。", "绣橘": "绣橘，贾迎春丫鬟。", "莲花儿": "莲花儿，贾迎春丫鬟。", "葵官": "葵官，大观园戏班丑角。", "豆官": "豆官，大观园戏班。", "艾官": "艾官，大观园戏班。", "茄官": "茄官，大观园戏班。", "宝官": "宝官，大观园戏班。", "玉官": "玉官，大观园戏班。", "药官": "药官，大观园戏班，与藕官有情。", "庆儿": "庆儿，王熙凤小厮。", "来旺": "来旺，王熙凤手下，放高利贷。", "来旺媳妇": "来旺媳妇，王熙凤心腹。", "兴儿": "兴儿，贾琏小厮。", "翠缕": "翠缕，史湘云丫鬟。", "琥珀": "琥珀，贾母丫鬟。", "翡翠": "翡翠，贾母丫鬟。", "玻璃": "玻璃，贾母丫鬟。", "丰儿": "丰儿，王熙凤丫鬟。", "善姐": "善姐，王熙凤派去伺候尤二姐的丫鬟。实际是欺负尤二姐。", "素云": "素云，李纨丫鬟。", "碧月": "碧月，李纨丫鬟。", "封肃": "封肃，甄士隐之岳父，势利小人。", "娇杏": "娇杏，甄家丫鬟。回头看贾雨村一眼，后被贾雨村娶为正妻。", "霍启": "霍启，甄士隐家仆。元宵节丢失甄英莲。", "孙绍祖": "孙绍祖，贾迎春之夫。暴虐好色，迎春嫁过去一年便被他折磨致死。"};

var XYF={"孙悟空": "孙悟空，东胜神洲傲来国花果山灵石所生，拜须菩提祖师为师，学会七十二变、筋斗云。大闹天宫，被如来压五行山下五百年。后保唐僧西天取经，历经九九八十一难，修成正果，被封为斗战胜佛。嫉恶如仇，机智勇敢，是全书最核心的角色。", "唐僧": "唐僧，俗姓陈，名江流，法号玄奘，号三藏。如来佛祖二弟子金蝉子转世。奉唐太宗之命前往西天取经，收孙悟空、猪八戒、沙僧、白龙马为徒。心地善良但优柔寡断，常被妖怪蒙骗。历经九九八十一难，终到西天取得真经，被封为旃檀功德佛。", "猪八戒": "猪八戒，原为天蓬元帅，因调戏嫦娥被贬下凡错投猪胎。入赘高老庄为婿，后被孙悟空收服，保唐僧取经。贪吃好色，懒惰怯战，但也不乏勇猛时刻。取经成功后封为净坛使者。", "沙僧": "沙僧，原为卷帘大将，因失手打碎琉璃盏被贬下凡，在流沙河为妖吃人。被悟空收服后保唐僧取经。忠心耿耿，任劳任怨，是取经队伍中最稳重的人物。取经成功后封为金身罗汉。", "白龙马": "白龙马，西海龙王敖闰之子，因纵火烧了龙宫夜明珠被贬。后化为白马驮唐僧西行，关键时刻也曾救过唐僧。取经成功后化为八部天龙马。", "如来佛祖": "如来佛祖，即释迦牟尼佛，西天灵山大雷音寺之祖。法力无边，一手降服大闹天宫的孙悟空，策划取经大业。最终传授真经，封赏取经有功者。", "观音菩萨": "观音菩萨，南海普陀山落伽山大慈大悲救苦救难观世音菩萨。取经项目的实际组织者和监督者，为唐僧安排孙悟空三徒，多次出手解救取经人的危难。", "文殊菩萨": "文殊菩萨，四大菩萨之一，代表智慧。坐骑青狮曾下凡为妖。", "普贤菩萨": "普贤菩萨，四大菩萨之一，代表行愿。坐骑白象曾下凡为妖。", "地藏王菩萨": "地藏王菩萨，发誓地狱不空誓不成佛。掌管幽冥界。", "弥勒佛": "弥勒佛，未来佛，东来佛祖。黄眉怪是其撞钟童子所化。", "燃灯古佛": "燃灯古佛，过去佛，地位尊崇。曾指引取经事宜。", "菩提祖师": "菩提祖师，须菩提祖师，孙悟空的师父。精通儒释道三教，传授悟空七十二变、筋斗云后便不再相见，神秘莫测。", "灵吉菩萨": "灵吉菩萨，曾帮助悟空降服黄风怪，赐定风丹。", "降龙罗汉": "降龙罗汉，十八罗汉之一。", "伏虎罗汉": "伏虎罗汉，十八罗汉之一。", "阿难": "阿难尊者，如来十大弟子之一，多闻第一。", "迦叶": "迦叶尊者，如来十大弟子之一。取经时曾向唐僧索要人事（贿赂）才肯传经。", "玉皇大帝": "玉皇大帝，天庭之主，掌管三界。孙悟空大闹天宫时曾派兵征讨，后请如来降服悟空。历经一千七百五十劫，每劫十二万九千六百年。", "王母娘娘": "王母娘娘，天庭女仙之首，掌管蟠桃园。蟠桃会未邀孙悟空，引发大闹天宫。", "太上老君": "太上老君，道教始祖，兜率宫之主。炼制仙丹神器，曾收服青牛精。多次帮助取经团队，也曾被孙悟空偷吃仙丹。", "太白金星": "太白金星，玉帝近臣，主招安。多次下凡调和天庭与孙悟空之间的矛盾，建议封孙悟空为弼马温及齐天大圣。", "二郎神": "二郎神杨戬，玉帝外甥，灌江口显圣二郎真君。第三只眼，带哮天犬。曾与孙悟空大战，难分胜负。", "哪吒": "哪吒三太子，托塔李天王之子，脚踩风火轮。曾参与围剿孙悟空，后多次下界助取经人降妖。", "托塔天王": "托塔李天王李靖，天庭将领。执掌天兵天将，多次下界降妖。", "四大天王": "四大天王，天庭守门武将：增长天王、持国天王、多闻天王、广目天王。", "巨灵神": "巨灵神，天庭先锋，率先征讨孙悟空被打败。", "月老": "月老，主管人间姻缘的神仙。", "嫦娥": "嫦娥，广寒宫仙女，猪八戒因调戏她被贬。", "吴刚": "吴刚，广寒宫伐桂之人。", "赤脚大仙": "赤脚大仙，天庭神仙，赤脚行走。", "福星": "福星，福禄寿三星之一。", "禄星": "禄星，福禄寿三星之一。", "寿星": "寿星，福禄寿三星之一。", "武曲星君": "武曲星君，天庭星官，曾告知悟空弼马温一职低微。", "混世魔王": "混世魔王，孙悟空学艺归来后斩杀的第一个妖魔，占据花果山水帘洞。", "牛魔王": "牛魔王，平天大圣，孙悟空的结拜大哥。力大无穷，会七十二变。妻铁扇公主，子红孩儿。因孙悟空请天兵围剿而降，皈依佛门。", "铁扇公主": "铁扇公主罗刹女，牛魔王之妻，红孩儿之母。有芭蕉扇可扇灭火焰山大火，曾因红孩儿之事与孙悟空冲突。", "红孩儿": "红孩儿，牛魔王与铁扇公主之子，号圣婴大王。会使三昧真火，烧得悟空狼狈不堪。后被观音收服为善财童子。", "白骨精": "白骨精，白骨夫人，善于变化。三次变化为村姑、老妇、老翁欺骗唐僧，被悟空三打白骨精。", "黄袍怪": "黄袍怪，原是天上奎木狼星，下凡为妖。掳走宝象国公主百花羞，后被天庭收回。", "金角大王": "金角大王，太上老君看金炉的童子下凡为妖，携紫金红葫芦等法宝。被悟空降服。", "银角大王": "银角大王，太上老君看银炉的童子下凡为妖，与金角大王同伙。有羊脂玉净瓶等法宝。", "精细鬼": "精细鬼，金角大王部下小妖，被悟空戏耍。", "伶俐虫": "伶俐虫，金角大王部下小妖，与精细鬼搭档。", "九尾狐": "九尾狐，金角大王之母，被悟空一棒打死。", "青牛精": "青牛精，太上老君坐骑青牛下凡为妖。有金刚琢可收天下兵器，孙悟空请遍天庭神仙都无可奈何，最后老君亲自收服。", "黄风怪": "黄风怪，黄毛貂鼠精，三昧神风威力极大。被灵吉菩萨收服。", "沙僧（流沙河时期）": "沙悟净在流沙河为妖时吃人无数，脖子上挂九个人骷髅。", "六耳猕猴": "六耳猕猴，假孙悟空，与悟空一模一样，无人能辨。打到如来面前才被识破，被真悟空一棒打死。", "铁扇公主（罗刹女）": "见铁扇公主条目。", "玉面狐狸": "玉面狐狸，万岁狐王之女，牛魔王之妾。被猪八戒一耙打死。", "车迟国三妖": "车迟国三妖——虎力大仙、鹿力大仙、羊力大仙，会五雷法求雨。与唐僧赌斗，先后现出原形。", "虎力大仙": "虎力大仙，车迟国国师，黄毛虎精。与唐僧比砍头被悟空作弄而死。", "鹿力大仙": "鹿力大仙，车迟国国师，白毛鹿精。与唐僧比剖腹被悟空作弄而死。", "羊力大仙": "羊力大仙，车迟国国师，羚羊精。与唐僧比油锅洗澡被悟空作弄而死。", "通天河老鼋": "通天河老鼋，修炼千年的老鳖精。驮唐僧师徒过通天河，托唐僧问如来自己何时能脱壳成人。取经归来再次相助，发现唐僧忘记问如来而怒将其翻入河中。", "灵感大王": "灵感大王，观音菩萨莲花池里的金鱼精。在通天河吃童男童女，被观音用竹篮收服。", "青狮精": "青狮精，文殊菩萨坐骑，下凡为狮驼岭狮驼洞大王。曾大闹南天门。后被文殊收回。", "白象精": "白象精，普贤菩萨坐骑，狮驼岭二大王。鼻子威力无穷。后被普贤收回。", "大鹏金翅雕": "大鹏金翅雕，狮驼岭三大王。如来佛祖的舅舅（与如来有亲），法力高强，连悟空都不是对手。最后被如来亲自收服。", "九头虫": "九头虫，碧波潭万圣龙王的女婿。九头驸马，被二郎神和悟空联手打败后逃往北海。", "黄眉老祖": "黄眉老祖，又称黄眉大王，弥勒佛的撞钟童子下凡。设小雷音寺，有人种袋可收万物。被弥勒佛收服。", "蝎子精": "蝎子精，琵琶精。倒马毒桩连如来都戳痛过。在女儿国掳走唐僧，被卯日星官降服。", "百眼魔君": "百眼魔君，蜈蚣精。黄风岭黄花观观主，千眼金光阵威力无穷。被毗蓝婆菩萨降服。", "蜘蛛精": "蜘蛛精，盘丝洞七姐妹，能吐丝结网。后被悟空降服。", "老鼠精": "老鼠精，地涌夫人，金鼻白毛老鼠精。原是灵山上的老鼠偷吃灯油成精，拜托塔天王为义父。掳走唐僧，后被天兵降服。", "玉兔精": "玉兔精，广寒宫捣药的玉兔下凡为妖。冒充天竺国公主，被太阴星君收回。", "九灵元圣": "九灵元圣，太乙天尊的坐骑九头狮子。一声吼上通三圣下彻九泉，法力高强。后被太乙天尊收回。", "如意真仙": "如意真仙，牛魔王之弟，红孩儿之叔。霸占落胎泉。", "南山大王": "南山大王，艾叶花皮豹子精。自称南山大王，被悟空和八戒联手打死。", "小鼍龙": "小鼍龙，泾河龙王之子，西海龙王外甥。在黑水河为妖擒走唐僧，后被西海太子收服。", "赛太岁": "赛太岁，观音菩萨坐骑金毛犼下凡为妖。有紫金铃法宝，掳走朱紫国金圣宫娘娘。被观音收回。", "金毛犼": "金毛犼即赛太岁，见赛太岁条目。", "奔波儿灞": "奔波儿灞，碧波潭鲇鱼怪，九头虫部下小妖。", "灞波儿奔": "灞波儿奔，碧波潭黑鱼精，九头虫部下小妖。", "精细虫": "精细虫，黄花观蜈蚣精部下小妖。", "黑熊精": "黑熊精，黑风山黑风洞大王。偷走唐僧锦斓袈裟，后被观音收服为落伽山守山大神。", "镇元大仙": "镇元大仙，万寿山五庄观地仙之祖。有草还丹（人参果），与悟空结拜为兄弟。法力高强不亚于如来。", "人参果": "镇元大仙的灵根果树，三千年开花三千年结果三千年成熟，闻一闻能活三百六十岁。", "白骨夫人": "见白骨精条目。", "火焰山土地": "火焰山土地神，原是兜率宫守炉道人。因孙悟空踢倒八卦炉，炉砖落在此处化为火焰山。", "东海龙王": "东海龙王敖广，四海龙王之首。孙悟空的如意金箍棒即取自东海龙宫。", "南海龙王": "南海龙王敖钦。", "西海龙王": "西海龙王敖闰，白龙马之父。", "北海龙王": "北海龙王敖顺。", "泾河龙王": "泾河龙王，因与算命先生袁守诚打赌，克扣降雨点数被魏征梦中斩首。", "万圣龙王": "万圣龙王，碧波潭龙王，九头虫的后父。", "唐太宗": "唐太宗李世民，派唐僧取经。在阴间遭遇十殿阎王，后还阳大赦天下。", "魏征": "魏征，唐太宗丞相，梦中斩了泾河龙王。", "袁守诚": "袁守诚，长安城算命先生，算卦极准。与泾河龙王打赌致其被斩。", "刘全": "刘全，因妻自缢去阴间送瓜果，被封为阴间总管。", "陈光蕊": "陈光蕊，唐僧的父亲，新科状元。被水贼刘洪害死，后被龙王所救。", "殷温娇": "殷温娇，唐僧的母亲，被水贼霸占。唐僧出生后将其放入木盆顺江漂流，得金山寺长老相救。", "李世民": "见唐太宗。", "李世民（唐太宗）": "见唐太宗。", "女儿国国王": "女儿国国王，西梁女国君主。对唐僧一见钟情，欲招为夫。唐僧虽动凡心但为取经大业忍痛离去。", "琵琶洞主": "见蝎子精。", "寅将军": "寅将军，虎精。唐僧刚出长安在双叉岭遇到的第一伙妖怪，与熊山君、特处士一起吃了唐僧的两个随从。太白金星救走唐僧。", "熊山君": "熊山君，熊精。与寅将军、特处士在双叉岭吃唐僧随从。", "特处士": "特处士，野牛精。与寅将军、熊山君同为双叉岭妖。", "刘伯钦": "刘伯钦，镇山太保，猎户出身。在双叉岭打死老虎救了唐僧，护送至两界山。唐僧在此遇到孙悟空。", "乌鸡国国王": "乌鸡国国王，被文殊菩萨座下青狮精推入井中淹死三年。其鬼魂向唐僧诉冤，悟空救活他并揭穿假国王。", "井龙王": "井龙王，乌鸡国御花园井中龙王。用定颜珠保存了乌鸡国国王尸身三年不腐。", "万圣公主": "万圣公主，碧波潭万圣龙王之女，九头虫之妻。曾去大罗天上盗取王母娘娘的九叶灵芝草。", "杏仙": "杏仙，荆棘岭十八公中的杏树精，貌美多情，欲与唐僧成亲。后被八戒一钯打倒。", "十八公": "十八公，荆棘岭松树精，与唐僧吟诗作对。", "孤直公": "孤直公，荆棘岭柏树精。", "凌空子": "凌空子，荆棘岭桧树精。", "拂云叟": "拂云叟，荆棘岭竹精。", "杏仙等树精": "见杏仙、十八公。", "金圣宫娘娘": "金圣宫娘娘，朱紫国王后，被赛太岁掳走。有神仙所赐五彩仙衣护体，三年未被妖魔染指。", "紫阳真人": "紫阳真人，张紫阳。为保护金圣宫娘娘赠其五彩仙衣。", "七仙女": "盘丝洞七蜘蛛精——大蛛精、二蛛精等七姐妹（七人分别对应红橙黄绿青蓝紫七色）。", "小钻风": "小钻风，狮驼岭巡山小妖，被孙悟空假扮套出狮驼岭虚实。\"大王叫我来巡山\"的著名段子。", "犀牛精": "犀牛精，金平府青龙山玄英洞三头犀牛精——辟寒大王、辟暑大王、辟尘大王。假扮佛祖偷吃灯油。被四木禽星降服。", "辟寒大王": "辟寒大王，金平府三犀牛精之一。假扮佛像偷酥合香油。", "辟暑大王": "辟暑大王，金平府三犀牛精之一。", "辟尘大王": "辟尘大王，金平府三犀牛精之一。", "太阴星君": "太阴星君，广寒宫之主。来收回下凡为妖的玉兔精。", "布金禅寺老僧": "布金禅寺老僧，在寺中发现假冒天竺国公主的真公主。", "凤仙郡郡侯": "凤仙郡郡侯上官氏。因推倒供桌骂天致凤仙郡三年大旱。后诚心悔过，悟空上天廷求情，玉帝降旨降雨。", "四木禽星": "四木禽星——角木蛟、斗木獬、奎木狼、井木犴，天庭星官。降服金平府犀牛精。", "奎木狼": "奎木狼，二十八宿之一。即下凡为妖的黄袍怪（见黄袍怪）。", "卯日星官": "卯日星官，负责司晨的大公鸡神仙。用叫声降服了蝎子精。", "毗蓝婆菩萨": "毗蓝婆菩萨，昴日星官之母。用绣花针降服了百眼魔君（蜈蚣精）。", "昴日星官": "昴日星官，毗蓝婆菩萨之子。本相为六七尺高大公鸡，可降服蝎子精等毒物。", "太乙救苦天尊": "太乙救苦天尊，九灵元圣（九头狮子）的主人。亲自下界收回坐骑。", "张道陵": "张道陵，道教天师，天师之首。", "黄袍怪（奎木狼）": "黄袍怪即奎木狼星下凡，见黄袍怪。", "如意真仙（落胎泉）": "见如意真仙。", "南山大王（豹精）": "见南山大王。", "黄狮精": "黄狮精，九灵元圣的孙子辈。偷走了悟空八戒沙僧的兵器，并搞了一场钉耙宴。", "豹头山虎口洞": "豹头山虎口洞，黄狮精的洞府。", "灭法国国王": "灭法国国王，曾许愿杀一万个和尚，已杀了九千九百九十六个。悟空设计剃了举国上下头发，国王悔改。", "通天河老龟": "见通天河老鼋。", "寇员外": "寇员外，寇洪。斋僧万人的大善人，被强盗踢死。悟空去地府将其救活。", "铜台府刺史": "铜台府刺史，将唐僧师徒误认为劫匪抓捕。后查清真相释放。", "接引佛祖": "接引佛祖，在凌云渡撑无底船接唐僧师徒渡过最后一关，脱胎换骨。", "唐王": "见唐太宗。", "袁天罡": "袁天罡，唐代著名术士，袁守诚之侄。", "蛟魔王": "蛟魔王，覆海大圣，孙悟空结拜二哥。七大圣之一，蛟龙得道。", "鹏魔王": "鹏魔王，混天大圣，孙悟空结拜三哥。七大圣之一，大鹏鸟。", "狮驼王": "狮驼王，移山大圣，孙悟空结拜四哥。七大圣之一，青毛狮子。", "猕猴王": "猕猴王，通风大圣，孙悟空结拜五哥。七大圣之一，猕猴。", "禺狨王": "禺狨王，驱神大圣，孙悟空结拜六哥。七大圣之一，金丝猴得道。", "独角鬼王": "独角鬼王，花果山部下。拥戴孙悟空为齐天大圣。", "通臂猿猴": "通臂猿猴，花果山四老猴之一，通晓人事。", "赤尻马猴": "赤尻马猴，花果山四老猴之一，晓阴阳会人事。", "高太公": "高太公，高老庄庄主，猪八戒的后父。请孙悟空降服猪八戒。", "高翠兰": "高翠兰，高太公三女，猪八戒之妻。", "刘洪": "刘洪，水贼。害死陈光蕊，霸占殷温娇十八年。后被处决。", "乌巢禅师": "乌巢禅师，浮屠山隐居僧人。传授唐僧《心经》。", "清风": "清风，五庄观镇元大仙座下童子，看守人参果树。", "明月": "明月，五庄观镇元大仙座下童子，看守人参果树。", "百花羞": "百花羞，宝象国公主。被黄袍怪掳去做妻十三年。", "有来有去": "有来有去，赛太岁部下小妖。被孙悟空打死。"}F;
var XYH={"孙悟空": "孙悟空，东胜神洲傲来国花果山灵石所生，拜须菩提祖师为师，学会七十二变、筋斗云。大闹天宫，被如来压五行山下五百年。后保唐僧西天取经，历经九九八十一难，修成正果，被封为斗战胜佛。嫉恶如仇，机智勇敢，是全书最核心的角色。", "唐僧": "唐僧，俗姓陈，名江流，法号玄奘，号三藏。如来佛祖二弟子金蝉子转世。奉唐太宗之命前往西天取经，收孙悟空、猪八戒、沙僧、白龙马为徒。心地善良但优柔寡断，常被妖怪蒙骗。历经九九八十一难，终到西天取得真经，被封为旃檀功德佛。", "猪八戒": "猪八戒，原为天蓬元帅，因调戏嫦娥被贬下凡错投猪胎。入赘高老庄为婿，后被孙悟空收服，保唐僧取经。贪吃好色，懒惰怯战，但也不乏勇猛时刻。取经成功后封为净坛使者。", "沙僧": "沙僧，原为卷帘大将，因失手打碎琉璃盏被贬下凡，在流沙河为妖吃人。被悟空收服后保唐僧取经。忠心耿耿，任劳任怨，是取经队伍中最稳重的人物。取经成功后封为金身罗汉。", "白龙马": "白龙马，西海龙王敖闰之子，因纵火烧了龙宫夜明珠被贬。后化为白马驮唐僧西行，关键时刻也曾救过唐僧。取经成功后化为八部天龙马。", "如来佛祖": "如来佛祖，即释迦牟尼佛，西天灵山大雷音寺之祖。法力无边，一手降服大闹天宫的孙悟空，策划取经大业。最终传授真经，封赏取经有功者。", "观音菩萨": "观音菩萨，南海普陀山落伽山大慈大悲救苦救难观世音菩萨。取经项目的实际组织者和监督者，为唐僧安排孙悟空三徒，多次出手解救取经人的危难。", "文殊菩萨": "文殊菩萨，四大菩萨之一，代表智慧。坐骑青狮曾下凡为妖。", "普贤菩萨": "普贤菩萨，四大菩萨之一，代表行愿。坐骑白象曾下凡为妖。", "地藏王菩萨": "地藏王菩萨，发誓地狱不空誓不成佛。掌管幽冥界。", "弥勒佛": "弥勒佛，未来佛，东来佛祖。黄眉怪是其撞钟童子所化。", "燃灯古佛": "燃灯古佛，过去佛，地位尊崇。曾指引取经事宜。", "菩提祖师": "菩提祖师，须菩提祖师，孙悟空的师父。精通儒释道三教，传授悟空七十二变、筋斗云后便不再相见，神秘莫测。", "灵吉菩萨": "灵吉菩萨，曾帮助悟空降服黄风怪，赐定风丹。", "降龙罗汉": "降龙罗汉，十八罗汉之一。", "伏虎罗汉": "伏虎罗汉，十八罗汉之一。", "阿难": "阿难尊者，如来十大弟子之一，多闻第一。", "迦叶": "迦叶尊者，如来十大弟子之一。取经时曾向唐僧索要人事（贿赂）才肯传经。", "玉皇大帝": "玉皇大帝，天庭之主，掌管三界。孙悟空大闹天宫时曾派兵征讨，后请如来降服悟空。历经一千七百五十劫，每劫十二万九千六百年。", "王母娘娘": "王母娘娘，天庭女仙之首，掌管蟠桃园。蟠桃会未邀孙悟空，引发大闹天宫。", "太上老君": "太上老君，道教始祖，兜率宫之主。炼制仙丹神器，曾收服青牛精。多次帮助取经团队，也曾被孙悟空偷吃仙丹。", "太白金星": "太白金星，玉帝近臣，主招安。多次下凡调和天庭与孙悟空之间的矛盾，建议封孙悟空为弼马温及齐天大圣。", "二郎神": "二郎神杨戬，玉帝外甥，灌江口显圣二郎真君。第三只眼，带哮天犬。曾与孙悟空大战，难分胜负。", "哪吒": "哪吒三太子，托塔李天王之子，脚踩风火轮。曾参与围剿孙悟空，后多次下界助取经人降妖。", "托塔天王": "托塔李天王李靖，天庭将领。执掌天兵天将，多次下界降妖。", "四大天王": "四大天王，天庭守门武将：增长天王、持国天王、多闻天王、广目天王。", "巨灵神": "巨灵神，天庭先锋，率先征讨孙悟空被打败。", "月老": "月老，主管人间姻缘的神仙。", "嫦娥": "嫦娥，广寒宫仙女，猪八戒因调戏她被贬。", "吴刚": "吴刚，广寒宫伐桂之人。", "赤脚大仙": "赤脚大仙，天庭神仙，赤脚行走。", "福星": "福星，福禄寿三星之一。", "禄星": "禄星，福禄寿三星之一。", "寿星": "寿星，福禄寿三星之一。", "武曲星君": "武曲星君，天庭星官，曾告知悟空弼马温一职低微。", "混世魔王": "混世魔王，孙悟空学艺归来后斩杀的第一个妖魔，占据花果山水帘洞。", "牛魔王": "牛魔王，平天大圣，孙悟空的结拜大哥。力大无穷，会七十二变。妻铁扇公主，子红孩儿。因孙悟空请天兵围剿而降，皈依佛门。", "铁扇公主": "铁扇公主罗刹女，牛魔王之妻，红孩儿之母。有芭蕉扇可扇灭火焰山大火，曾因红孩儿之事与孙悟空冲突。", "红孩儿": "红孩儿，牛魔王与铁扇公主之子，号圣婴大王。会使三昧真火，烧得悟空狼狈不堪。后被观音收服为善财童子。", "白骨精": "白骨精，白骨夫人，善于变化。三次变化为村姑、老妇、老翁欺骗唐僧，被悟空三打白骨精。", "黄袍怪": "黄袍怪，原是天上奎木狼星，下凡为妖。掳走宝象国公主百花羞，后被天庭收回。", "金角大王": "金角大王，太上老君看金炉的童子下凡为妖，携紫金红葫芦等法宝。被悟空降服。", "银角大王": "银角大王，太上老君看银炉的童子下凡为妖，与金角大王同伙。有羊脂玉净瓶等法宝。", "精细鬼": "精细鬼，金角大王部下小妖，被悟空戏耍。", "伶俐虫": "伶俐虫，金角大王部下小妖，与精细鬼搭档。", "九尾狐": "九尾狐，金角大王之母，被悟空一棒打死。", "青牛精": "青牛精，太上老君坐骑青牛下凡为妖。有金刚琢可收天下兵器，孙悟空请遍天庭神仙都无可奈何，最后老君亲自收服。", "黄风怪": "黄风怪，黄毛貂鼠精，三昧神风威力极大。被灵吉菩萨收服。", "沙僧（流沙河时期）": "沙悟净在流沙河为妖时吃人无数，脖子上挂九个人骷髅。", "六耳猕猴": "六耳猕猴，假孙悟空，与悟空一模一样，无人能辨。打到如来面前才被识破，被真悟空一棒打死。", "铁扇公主（罗刹女）": "见铁扇公主条目。", "玉面狐狸": "玉面狐狸，万岁狐王之女，牛魔王之妾。被猪八戒一耙打死。", "车迟国三妖": "车迟国三妖——虎力大仙、鹿力大仙、羊力大仙，会五雷法求雨。与唐僧赌斗，先后现出原形。", "虎力大仙": "虎力大仙，车迟国国师，黄毛虎精。与唐僧比砍头被悟空作弄而死。", "鹿力大仙": "鹿力大仙，车迟国国师，白毛鹿精。与唐僧比剖腹被悟空作弄而死。", "羊力大仙": "羊力大仙，车迟国国师，羚羊精。与唐僧比油锅洗澡被悟空作弄而死。", "通天河老鼋": "通天河老鼋，修炼千年的老鳖精。驮唐僧师徒过通天河，托唐僧问如来自己何时能脱壳成人。取经归来再次相助，发现唐僧忘记问如来而怒将其翻入河中。", "灵感大王": "灵感大王，观音菩萨莲花池里的金鱼精。在通天河吃童男童女，被观音用竹篮收服。", "青狮精": "青狮精，文殊菩萨坐骑，下凡为狮驼岭狮驼洞大王。曾大闹南天门。后被文殊收回。", "白象精": "白象精，普贤菩萨坐骑，狮驼岭二大王。鼻子威力无穷。后被普贤收回。", "大鹏金翅雕": "大鹏金翅雕，狮驼岭三大王。如来佛祖的舅舅（与如来有亲），法力高强，连悟空都不是对手。最后被如来亲自收服。", "九头虫": "九头虫，碧波潭万圣龙王的女婿。九头驸马，被二郎神和悟空联手打败后逃往北海。", "黄眉老祖": "黄眉老祖，又称黄眉大王，弥勒佛的撞钟童子下凡。设小雷音寺，有人种袋可收万物。被弥勒佛收服。", "蝎子精": "蝎子精，琵琶精。倒马毒桩连如来都戳痛过。在女儿国掳走唐僧，被卯日星官降服。", "百眼魔君": "百眼魔君，蜈蚣精。黄风岭黄花观观主，千眼金光阵威力无穷。被毗蓝婆菩萨降服。", "蜘蛛精": "蜘蛛精，盘丝洞七姐妹，能吐丝结网。后被悟空降服。", "老鼠精": "老鼠精，地涌夫人，金鼻白毛老鼠精。原是灵山上的老鼠偷吃灯油成精，拜托塔天王为义父。掳走唐僧，后被天兵降服。", "玉兔精": "玉兔精，广寒宫捣药的玉兔下凡为妖。冒充天竺国公主，被太阴星君收回。", "九灵元圣": "九灵元圣，太乙天尊的坐骑九头狮子。一声吼上通三圣下彻九泉，法力高强。后被太乙天尊收回。", "如意真仙": "如意真仙，牛魔王之弟，红孩儿之叔。霸占落胎泉。", "南山大王": "南山大王，艾叶花皮豹子精。自称南山大王，被悟空和八戒联手打死。", "小鼍龙": "小鼍龙，泾河龙王之子，西海龙王外甥。在黑水河为妖擒走唐僧，后被西海太子收服。", "赛太岁": "赛太岁，观音菩萨坐骑金毛犼下凡为妖。有紫金铃法宝，掳走朱紫国金圣宫娘娘。被观音收回。", "金毛犼": "金毛犼即赛太岁，见赛太岁条目。", "奔波儿灞": "奔波儿灞，碧波潭鲇鱼怪，九头虫部下小妖。", "灞波儿奔": "灞波儿奔，碧波潭黑鱼精，九头虫部下小妖。", "精细虫": "精细虫，黄花观蜈蚣精部下小妖。", "黑熊精": "黑熊精，黑风山黑风洞大王。偷走唐僧锦斓袈裟，后被观音收服为落伽山守山大神。", "镇元大仙": "镇元大仙，万寿山五庄观地仙之祖。有草还丹（人参果），与悟空结拜为兄弟。法力高强不亚于如来。", "人参果": "镇元大仙的灵根果树，三千年开花三千年结果三千年成熟，闻一闻能活三百六十岁。", "白骨夫人": "见白骨精条目。", "火焰山土地": "火焰山土地神，原是兜率宫守炉道人。因孙悟空踢倒八卦炉，炉砖落在此处化为火焰山。", "东海龙王": "东海龙王敖广，四海龙王之首。孙悟空的如意金箍棒即取自东海龙宫。", "南海龙王": "南海龙王敖钦。", "西海龙王": "西海龙王敖闰，白龙马之父。", "北海龙王": "北海龙王敖顺。", "泾河龙王": "泾河龙王，因与算命先生袁守诚打赌，克扣降雨点数被魏征梦中斩首。", "万圣龙王": "万圣龙王，碧波潭龙王，九头虫的后父。", "唐太宗": "唐太宗李世民，派唐僧取经。在阴间遭遇十殿阎王，后还阳大赦天下。", "魏征": "魏征，唐太宗丞相，梦中斩了泾河龙王。", "袁守诚": "袁守诚，长安城算命先生，算卦极准。与泾河龙王打赌致其被斩。", "刘全": "刘全，因妻自缢去阴间送瓜果，被封为阴间总管。", "陈光蕊": "陈光蕊，唐僧的父亲，新科状元。被水贼刘洪害死，后被龙王所救。", "殷温娇": "殷温娇，唐僧的母亲，被水贼霸占。唐僧出生后将其放入木盆顺江漂流，得金山寺长老相救。", "李世民": "见唐太宗。", "李世民（唐太宗）": "见唐太宗。", "女儿国国王": "女儿国国王，西梁女国君主。对唐僧一见钟情，欲招为夫。唐僧虽动凡心但为取经大业忍痛离去。", "琵琶洞主": "见蝎子精。", "寅将军": "寅将军，虎精。唐僧刚出长安在双叉岭遇到的第一伙妖怪，与熊山君、特处士一起吃了唐僧的两个随从。太白金星救走唐僧。", "熊山君": "熊山君，熊精。与寅将军、特处士在双叉岭吃唐僧随从。", "特处士": "特处士，野牛精。与寅将军、熊山君同为双叉岭妖。", "刘伯钦": "刘伯钦，镇山太保，猎户出身。在双叉岭打死老虎救了唐僧，护送至两界山。唐僧在此遇到孙悟空。", "乌鸡国国王": "乌鸡国国王，被文殊菩萨座下青狮精推入井中淹死三年。其鬼魂向唐僧诉冤，悟空救活他并揭穿假国王。", "井龙王": "井龙王，乌鸡国御花园井中龙王。用定颜珠保存了乌鸡国国王尸身三年不腐。", "万圣公主": "万圣公主，碧波潭万圣龙王之女，九头虫之妻。曾去大罗天上盗取王母娘娘的九叶灵芝草。", "杏仙": "杏仙，荆棘岭十八公中的杏树精，貌美多情，欲与唐僧成亲。后被八戒一钯打倒。", "十八公": "十八公，荆棘岭松树精，与唐僧吟诗作对。", "孤直公": "孤直公，荆棘岭柏树精。", "凌空子": "凌空子，荆棘岭桧树精。", "拂云叟": "拂云叟，荆棘岭竹精。", "杏仙等树精": "见杏仙、十八公。", "金圣宫娘娘": "金圣宫娘娘，朱紫国王后，被赛太岁掳走。有神仙所赐五彩仙衣护体，三年未被妖魔染指。", "紫阳真人": "紫阳真人，张紫阳。为保护金圣宫娘娘赠其五彩仙衣。", "七仙女": "盘丝洞七蜘蛛精——大蛛精、二蛛精等七姐妹（七人分别对应红橙黄绿青蓝紫七色）。", "小钻风": "小钻风，狮驼岭巡山小妖，被孙悟空假扮套出狮驼岭虚实。\"大王叫我来巡山\"的著名段子。", "犀牛精": "犀牛精，金平府青龙山玄英洞三头犀牛精——辟寒大王、辟暑大王、辟尘大王。假扮佛祖偷吃灯油。被四木禽星降服。", "辟寒大王": "辟寒大王，金平府三犀牛精之一。假扮佛像偷酥合香油。", "辟暑大王": "辟暑大王，金平府三犀牛精之一。", "辟尘大王": "辟尘大王，金平府三犀牛精之一。", "太阴星君": "太阴星君，广寒宫之主。来收回下凡为妖的玉兔精。", "布金禅寺老僧": "布金禅寺老僧，在寺中发现假冒天竺国公主的真公主。", "凤仙郡郡侯": "凤仙郡郡侯上官氏。因推倒供桌骂天致凤仙郡三年大旱。后诚心悔过，悟空上天廷求情，玉帝降旨降雨。", "四木禽星": "四木禽星——角木蛟、斗木獬、奎木狼、井木犴，天庭星官。降服金平府犀牛精。", "奎木狼": "奎木狼，二十八宿之一。即下凡为妖的黄袍怪（见黄袍怪）。", "卯日星官": "卯日星官，负责司晨的大公鸡神仙。用叫声降服了蝎子精。", "毗蓝婆菩萨": "毗蓝婆菩萨，昴日星官之母。用绣花针降服了百眼魔君（蜈蚣精）。", "昴日星官": "昴日星官，毗蓝婆菩萨之子。本相为六七尺高大公鸡，可降服蝎子精等毒物。", "太乙救苦天尊": "太乙救苦天尊，九灵元圣（九头狮子）的主人。亲自下界收回坐骑。", "张道陵": "张道陵，道教天师，天师之首。", "黄袍怪（奎木狼）": "黄袍怪即奎木狼星下凡，见黄袍怪。", "如意真仙（落胎泉）": "见如意真仙。", "南山大王（豹精）": "见南山大王。", "黄狮精": "黄狮精，九灵元圣的孙子辈。偷走了悟空八戒沙僧的兵器，并搞了一场钉耙宴。", "豹头山虎口洞": "豹头山虎口洞，黄狮精的洞府。", "灭法国国王": "灭法国国王，曾许愿杀一万个和尚，已杀了九千九百九十六个。悟空设计剃了举国上下头发，国王悔改。", "通天河老龟": "见通天河老鼋。", "寇员外": "寇员外，寇洪。斋僧万人的大善人，被强盗踢死。悟空去地府将其救活。", "铜台府刺史": "铜台府刺史，将唐僧师徒误认为劫匪抓捕。后查清真相释放。", "接引佛祖": "接引佛祖，在凌云渡撑无底船接唐僧师徒渡过最后一关，脱胎换骨。", "唐王": "见唐太宗。", "袁天罡": "袁天罡，唐代著名术士，袁守诚之侄。", "蛟魔王": "蛟魔王，覆海大圣，孙悟空结拜二哥。七大圣之一，蛟龙得道。", "鹏魔王": "鹏魔王，混天大圣，孙悟空结拜三哥。七大圣之一，大鹏鸟。", "狮驼王": "狮驼王，移山大圣，孙悟空结拜四哥。七大圣之一，青毛狮子。", "猕猴王": "猕猴王，通风大圣，孙悟空结拜五哥。七大圣之一，猕猴。", "禺狨王": "禺狨王，驱神大圣，孙悟空结拜六哥。七大圣之一，金丝猴得道。", "独角鬼王": "独角鬼王，花果山部下。拥戴孙悟空为齐天大圣。", "通臂猿猴": "通臂猿猴，花果山四老猴之一，通晓人事。", "赤尻马猴": "赤尻马猴，花果山四老猴之一，晓阴阳会人事。", "高太公": "高太公，高老庄庄主，猪八戒的后父。请孙悟空降服猪八戒。", "高翠兰": "高翠兰，高太公三女，猪八戒之妻。", "刘洪": "刘洪，水贼。害死陈光蕊，霸占殷温娇十八年。后被处决。", "乌巢禅师": "乌巢禅师，浮屠山隐居僧人。传授唐僧《心经》。", "清风": "清风，五庄观镇元大仙座下童子，看守人参果树。", "明月": "明月，五庄观镇元大仙座下童子，看守人参果树。", "百花羞": "百花羞，宝象国公主。被黄袍怪掳去做妻十三年。", "有来有去": "有来有去，赛太岁部下小妖。被孙悟空打死。"}H;
var XYD={"孙悟空": "孙悟空，东胜神洲傲来国花果山灵石所生，拜须菩提祖师为师，学会七十二变、筋斗云。大闹天宫，被如来压五行山下五百年。后保唐僧西天取经，历经九九八十一难，修成正果，被封为斗战胜佛。嫉恶如仇，机智勇敢，是全书最核心的角色。", "唐僧": "唐僧，俗姓陈，名江流，法号玄奘，号三藏。如来佛祖二弟子金蝉子转世。奉唐太宗之命前往西天取经，收孙悟空、猪八戒、沙僧、白龙马为徒。心地善良但优柔寡断，常被妖怪蒙骗。历经九九八十一难，终到西天取得真经，被封为旃檀功德佛。", "猪八戒": "猪八戒，原为天蓬元帅，因调戏嫦娥被贬下凡错投猪胎。入赘高老庄为婿，后被孙悟空收服，保唐僧取经。贪吃好色，懒惰怯战，但也不乏勇猛时刻。取经成功后封为净坛使者。", "沙僧": "沙僧，原为卷帘大将，因失手打碎琉璃盏被贬下凡，在流沙河为妖吃人。被悟空收服后保唐僧取经。忠心耿耿，任劳任怨，是取经队伍中最稳重的人物。取经成功后封为金身罗汉。", "白龙马": "白龙马，西海龙王敖闰之子，因纵火烧了龙宫夜明珠被贬。后化为白马驮唐僧西行，关键时刻也曾救过唐僧。取经成功后化为八部天龙马。", "如来佛祖": "如来佛祖，即释迦牟尼佛，西天灵山大雷音寺之祖。法力无边，一手降服大闹天宫的孙悟空，策划取经大业。最终传授真经，封赏取经有功者。", "观音菩萨": "观音菩萨，南海普陀山落伽山大慈大悲救苦救难观世音菩萨。取经项目的实际组织者和监督者，为唐僧安排孙悟空三徒，多次出手解救取经人的危难。", "文殊菩萨": "文殊菩萨，四大菩萨之一，代表智慧。坐骑青狮曾下凡为妖。", "普贤菩萨": "普贤菩萨，四大菩萨之一，代表行愿。坐骑白象曾下凡为妖。", "地藏王菩萨": "地藏王菩萨，发誓地狱不空誓不成佛。掌管幽冥界。", "弥勒佛": "弥勒佛，未来佛，东来佛祖。黄眉怪是其撞钟童子所化。", "燃灯古佛": "燃灯古佛，过去佛，地位尊崇。曾指引取经事宜。", "菩提祖师": "菩提祖师，须菩提祖师，孙悟空的师父。精通儒释道三教，传授悟空七十二变、筋斗云后便不再相见，神秘莫测。", "灵吉菩萨": "灵吉菩萨，曾帮助悟空降服黄风怪，赐定风丹。", "降龙罗汉": "降龙罗汉，十八罗汉之一。", "伏虎罗汉": "伏虎罗汉，十八罗汉之一。", "阿难": "阿难尊者，如来十大弟子之一，多闻第一。", "迦叶": "迦叶尊者，如来十大弟子之一。取经时曾向唐僧索要人事（贿赂）才肯传经。", "玉皇大帝": "玉皇大帝，天庭之主，掌管三界。孙悟空大闹天宫时曾派兵征讨，后请如来降服悟空。历经一千七百五十劫，每劫十二万九千六百年。", "王母娘娘": "王母娘娘，天庭女仙之首，掌管蟠桃园。蟠桃会未邀孙悟空，引发大闹天宫。", "太上老君": "太上老君，道教始祖，兜率宫之主。炼制仙丹神器，曾收服青牛精。多次帮助取经团队，也曾被孙悟空偷吃仙丹。", "太白金星": "太白金星，玉帝近臣，主招安。多次下凡调和天庭与孙悟空之间的矛盾，建议封孙悟空为弼马温及齐天大圣。", "二郎神": "二郎神杨戬，玉帝外甥，灌江口显圣二郎真君。第三只眼，带哮天犬。曾与孙悟空大战，难分胜负。", "哪吒": "哪吒三太子，托塔李天王之子，脚踩风火轮。曾参与围剿孙悟空，后多次下界助取经人降妖。", "托塔天王": "托塔李天王李靖，天庭将领。执掌天兵天将，多次下界降妖。", "四大天王": "四大天王，天庭守门武将：增长天王、持国天王、多闻天王、广目天王。", "巨灵神": "巨灵神，天庭先锋，率先征讨孙悟空被打败。", "月老": "月老，主管人间姻缘的神仙。", "嫦娥": "嫦娥，广寒宫仙女，猪八戒因调戏她被贬。", "吴刚": "吴刚，广寒宫伐桂之人。", "赤脚大仙": "赤脚大仙，天庭神仙，赤脚行走。", "福星": "福星，福禄寿三星之一。", "禄星": "禄星，福禄寿三星之一。", "寿星": "寿星，福禄寿三星之一。", "武曲星君": "武曲星君，天庭星官，曾告知悟空弼马温一职低微。", "混世魔王": "混世魔王，孙悟空学艺归来后斩杀的第一个妖魔，占据花果山水帘洞。", "牛魔王": "牛魔王，平天大圣，孙悟空的结拜大哥。力大无穷，会七十二变。妻铁扇公主，子红孩儿。因孙悟空请天兵围剿而降，皈依佛门。", "铁扇公主": "铁扇公主罗刹女，牛魔王之妻，红孩儿之母。有芭蕉扇可扇灭火焰山大火，曾因红孩儿之事与孙悟空冲突。", "红孩儿": "红孩儿，牛魔王与铁扇公主之子，号圣婴大王。会使三昧真火，烧得悟空狼狈不堪。后被观音收服为善财童子。", "白骨精": "白骨精，白骨夫人，善于变化。三次变化为村姑、老妇、老翁欺骗唐僧，被悟空三打白骨精。", "黄袍怪": "黄袍怪，原是天上奎木狼星，下凡为妖。掳走宝象国公主百花羞，后被天庭收回。", "金角大王": "金角大王，太上老君看金炉的童子下凡为妖，携紫金红葫芦等法宝。被悟空降服。", "银角大王": "银角大王，太上老君看银炉的童子下凡为妖，与金角大王同伙。有羊脂玉净瓶等法宝。", "精细鬼": "精细鬼，金角大王部下小妖，被悟空戏耍。", "伶俐虫": "伶俐虫，金角大王部下小妖，与精细鬼搭档。", "九尾狐": "九尾狐，金角大王之母，被悟空一棒打死。", "青牛精": "青牛精，太上老君坐骑青牛下凡为妖。有金刚琢可收天下兵器，孙悟空请遍天庭神仙都无可奈何，最后老君亲自收服。", "黄风怪": "黄风怪，黄毛貂鼠精，三昧神风威力极大。被灵吉菩萨收服。", "沙僧（流沙河时期）": "沙悟净在流沙河为妖时吃人无数，脖子上挂九个人骷髅。", "六耳猕猴": "六耳猕猴，假孙悟空，与悟空一模一样，无人能辨。打到如来面前才被识破，被真悟空一棒打死。", "铁扇公主（罗刹女）": "见铁扇公主条目。", "玉面狐狸": "玉面狐狸，万岁狐王之女，牛魔王之妾。被猪八戒一耙打死。", "车迟国三妖": "车迟国三妖——虎力大仙、鹿力大仙、羊力大仙，会五雷法求雨。与唐僧赌斗，先后现出原形。", "虎力大仙": "虎力大仙，车迟国国师，黄毛虎精。与唐僧比砍头被悟空作弄而死。", "鹿力大仙": "鹿力大仙，车迟国国师，白毛鹿精。与唐僧比剖腹被悟空作弄而死。", "羊力大仙": "羊力大仙，车迟国国师，羚羊精。与唐僧比油锅洗澡被悟空作弄而死。", "通天河老鼋": "通天河老鼋，修炼千年的老鳖精。驮唐僧师徒过通天河，托唐僧问如来自己何时能脱壳成人。取经归来再次相助，发现唐僧忘记问如来而怒将其翻入河中。", "灵感大王": "灵感大王，观音菩萨莲花池里的金鱼精。在通天河吃童男童女，被观音用竹篮收服。", "青狮精": "青狮精，文殊菩萨坐骑，下凡为狮驼岭狮驼洞大王。曾大闹南天门。后被文殊收回。", "白象精": "白象精，普贤菩萨坐骑，狮驼岭二大王。鼻子威力无穷。后被普贤收回。", "大鹏金翅雕": "大鹏金翅雕，狮驼岭三大王。如来佛祖的舅舅（与如来有亲），法力高强，连悟空都不是对手。最后被如来亲自收服。", "九头虫": "九头虫，碧波潭万圣龙王的女婿。九头驸马，被二郎神和悟空联手打败后逃往北海。", "黄眉老祖": "黄眉老祖，又称黄眉大王，弥勒佛的撞钟童子下凡。设小雷音寺，有人种袋可收万物。被弥勒佛收服。", "蝎子精": "蝎子精，琵琶精。倒马毒桩连如来都戳痛过。在女儿国掳走唐僧，被卯日星官降服。", "百眼魔君": "百眼魔君，蜈蚣精。黄风岭黄花观观主，千眼金光阵威力无穷。被毗蓝婆菩萨降服。", "蜘蛛精": "蜘蛛精，盘丝洞七姐妹，能吐丝结网。后被悟空降服。", "老鼠精": "老鼠精，地涌夫人，金鼻白毛老鼠精。原是灵山上的老鼠偷吃灯油成精，拜托塔天王为义父。掳走唐僧，后被天兵降服。", "玉兔精": "玉兔精，广寒宫捣药的玉兔下凡为妖。冒充天竺国公主，被太阴星君收回。", "九灵元圣": "九灵元圣，太乙天尊的坐骑九头狮子。一声吼上通三圣下彻九泉，法力高强。后被太乙天尊收回。", "如意真仙": "如意真仙，牛魔王之弟，红孩儿之叔。霸占落胎泉。", "南山大王": "南山大王，艾叶花皮豹子精。自称南山大王，被悟空和八戒联手打死。", "小鼍龙": "小鼍龙，泾河龙王之子，西海龙王外甥。在黑水河为妖擒走唐僧，后被西海太子收服。", "赛太岁": "赛太岁，观音菩萨坐骑金毛犼下凡为妖。有紫金铃法宝，掳走朱紫国金圣宫娘娘。被观音收回。", "金毛犼": "金毛犼即赛太岁，见赛太岁条目。", "奔波儿灞": "奔波儿灞，碧波潭鲇鱼怪，九头虫部下小妖。", "灞波儿奔": "灞波儿奔，碧波潭黑鱼精，九头虫部下小妖。", "精细虫": "精细虫，黄花观蜈蚣精部下小妖。", "黑熊精": "黑熊精，黑风山黑风洞大王。偷走唐僧锦斓袈裟，后被观音收服为落伽山守山大神。", "镇元大仙": "镇元大仙，万寿山五庄观地仙之祖。有草还丹（人参果），与悟空结拜为兄弟。法力高强不亚于如来。", "人参果": "镇元大仙的灵根果树，三千年开花三千年结果三千年成熟，闻一闻能活三百六十岁。", "白骨夫人": "见白骨精条目。", "火焰山土地": "火焰山土地神，原是兜率宫守炉道人。因孙悟空踢倒八卦炉，炉砖落在此处化为火焰山。", "东海龙王": "东海龙王敖广，四海龙王之首。孙悟空的如意金箍棒即取自东海龙宫。", "南海龙王": "南海龙王敖钦。", "西海龙王": "西海龙王敖闰，白龙马之父。", "北海龙王": "北海龙王敖顺。", "泾河龙王": "泾河龙王，因与算命先生袁守诚打赌，克扣降雨点数被魏征梦中斩首。", "万圣龙王": "万圣龙王，碧波潭龙王，九头虫的后父。", "唐太宗": "唐太宗李世民，派唐僧取经。在阴间遭遇十殿阎王，后还阳大赦天下。", "魏征": "魏征，唐太宗丞相，梦中斩了泾河龙王。", "袁守诚": "袁守诚，长安城算命先生，算卦极准。与泾河龙王打赌致其被斩。", "刘全": "刘全，因妻自缢去阴间送瓜果，被封为阴间总管。", "陈光蕊": "陈光蕊，唐僧的父亲，新科状元。被水贼刘洪害死，后被龙王所救。", "殷温娇": "殷温娇，唐僧的母亲，被水贼霸占。唐僧出生后将其放入木盆顺江漂流，得金山寺长老相救。", "李世民": "见唐太宗。", "李世民（唐太宗）": "见唐太宗。", "女儿国国王": "女儿国国王，西梁女国君主。对唐僧一见钟情，欲招为夫。唐僧虽动凡心但为取经大业忍痛离去。", "琵琶洞主": "见蝎子精。", "寅将军": "寅将军，虎精。唐僧刚出长安在双叉岭遇到的第一伙妖怪，与熊山君、特处士一起吃了唐僧的两个随从。太白金星救走唐僧。", "熊山君": "熊山君，熊精。与寅将军、特处士在双叉岭吃唐僧随从。", "特处士": "特处士，野牛精。与寅将军、熊山君同为双叉岭妖。", "刘伯钦": "刘伯钦，镇山太保，猎户出身。在双叉岭打死老虎救了唐僧，护送至两界山。唐僧在此遇到孙悟空。", "乌鸡国国王": "乌鸡国国王，被文殊菩萨座下青狮精推入井中淹死三年。其鬼魂向唐僧诉冤，悟空救活他并揭穿假国王。", "井龙王": "井龙王，乌鸡国御花园井中龙王。用定颜珠保存了乌鸡国国王尸身三年不腐。", "万圣公主": "万圣公主，碧波潭万圣龙王之女，九头虫之妻。曾去大罗天上盗取王母娘娘的九叶灵芝草。", "杏仙": "杏仙，荆棘岭十八公中的杏树精，貌美多情，欲与唐僧成亲。后被八戒一钯打倒。", "十八公": "十八公，荆棘岭松树精，与唐僧吟诗作对。", "孤直公": "孤直公，荆棘岭柏树精。", "凌空子": "凌空子，荆棘岭桧树精。", "拂云叟": "拂云叟，荆棘岭竹精。", "杏仙等树精": "见杏仙、十八公。", "金圣宫娘娘": "金圣宫娘娘，朱紫国王后，被赛太岁掳走。有神仙所赐五彩仙衣护体，三年未被妖魔染指。", "紫阳真人": "紫阳真人，张紫阳。为保护金圣宫娘娘赠其五彩仙衣。", "七仙女": "盘丝洞七蜘蛛精——大蛛精、二蛛精等七姐妹（七人分别对应红橙黄绿青蓝紫七色）。", "小钻风": "小钻风，狮驼岭巡山小妖，被孙悟空假扮套出狮驼岭虚实。\"大王叫我来巡山\"的著名段子。", "犀牛精": "犀牛精，金平府青龙山玄英洞三头犀牛精——辟寒大王、辟暑大王、辟尘大王。假扮佛祖偷吃灯油。被四木禽星降服。", "辟寒大王": "辟寒大王，金平府三犀牛精之一。假扮佛像偷酥合香油。", "辟暑大王": "辟暑大王，金平府三犀牛精之一。", "辟尘大王": "辟尘大王，金平府三犀牛精之一。", "太阴星君": "太阴星君，广寒宫之主。来收回下凡为妖的玉兔精。", "布金禅寺老僧": "布金禅寺老僧，在寺中发现假冒天竺国公主的真公主。", "凤仙郡郡侯": "凤仙郡郡侯上官氏。因推倒供桌骂天致凤仙郡三年大旱。后诚心悔过，悟空上天廷求情，玉帝降旨降雨。", "四木禽星": "四木禽星——角木蛟、斗木獬、奎木狼、井木犴，天庭星官。降服金平府犀牛精。", "奎木狼": "奎木狼，二十八宿之一。即下凡为妖的黄袍怪（见黄袍怪）。", "卯日星官": "卯日星官，负责司晨的大公鸡神仙。用叫声降服了蝎子精。", "毗蓝婆菩萨": "毗蓝婆菩萨，昴日星官之母。用绣花针降服了百眼魔君（蜈蚣精）。", "昴日星官": "昴日星官，毗蓝婆菩萨之子。本相为六七尺高大公鸡，可降服蝎子精等毒物。", "太乙救苦天尊": "太乙救苦天尊，九灵元圣（九头狮子）的主人。亲自下界收回坐骑。", "张道陵": "张道陵，道教天师，天师之首。", "黄袍怪（奎木狼）": "黄袍怪即奎木狼星下凡，见黄袍怪。", "如意真仙（落胎泉）": "见如意真仙。", "南山大王（豹精）": "见南山大王。", "黄狮精": "黄狮精，九灵元圣的孙子辈。偷走了悟空八戒沙僧的兵器，并搞了一场钉耙宴。", "豹头山虎口洞": "豹头山虎口洞，黄狮精的洞府。", "灭法国国王": "灭法国国王，曾许愿杀一万个和尚，已杀了九千九百九十六个。悟空设计剃了举国上下头发，国王悔改。", "通天河老龟": "见通天河老鼋。", "寇员外": "寇员外，寇洪。斋僧万人的大善人，被强盗踢死。悟空去地府将其救活。", "铜台府刺史": "铜台府刺史，将唐僧师徒误认为劫匪抓捕。后查清真相释放。", "接引佛祖": "接引佛祖，在凌云渡撑无底船接唐僧师徒渡过最后一关，脱胎换骨。", "唐王": "见唐太宗。", "袁天罡": "袁天罡，唐代著名术士，袁守诚之侄。", "蛟魔王": "蛟魔王，覆海大圣，孙悟空结拜二哥。七大圣之一，蛟龙得道。", "鹏魔王": "鹏魔王，混天大圣，孙悟空结拜三哥。七大圣之一，大鹏鸟。", "狮驼王": "狮驼王，移山大圣，孙悟空结拜四哥。七大圣之一，青毛狮子。", "猕猴王": "猕猴王，通风大圣，孙悟空结拜五哥。七大圣之一，猕猴。", "禺狨王": "禺狨王，驱神大圣，孙悟空结拜六哥。七大圣之一，金丝猴得道。", "独角鬼王": "独角鬼王，花果山部下。拥戴孙悟空为齐天大圣。", "通臂猿猴": "通臂猿猴，花果山四老猴之一，通晓人事。", "赤尻马猴": "赤尻马猴，花果山四老猴之一，晓阴阳会人事。", "高太公": "高太公，高老庄庄主，猪八戒的后父。请孙悟空降服猪八戒。", "高翠兰": "高翠兰，高太公三女，猪八戒之妻。", "刘洪": "刘洪，水贼。害死陈光蕊，霸占殷温娇十八年。后被处决。", "乌巢禅师": "乌巢禅师，浮屠山隐居僧人。传授唐僧《心经》。", "清风": "清风，五庄观镇元大仙座下童子，看守人参果树。", "明月": "明月，五庄观镇元大仙座下童子，看守人参果树。", "百花羞": "百花羞，宝象国公主。被黄袍怪掳去做妻十三年。", "有来有去": "有来有去，赛太岁部下小妖。被孙悟空打死。"}D;
var HLZ={"贾宝玉": "贾宝玉，荣国府贾政之子，衔通灵宝玉而生。全书男主角，前身为神瑛侍者。性情温柔，厌恶仕途经济，独钟情于林黛玉。最终在家族败落后悬崖撒手，出家为僧。", "林黛玉": "林黛玉，金陵十二钗之首，字颦颦。前身为绛珠仙草，为还神瑛侍者（宝玉）的灌溉之恩下凡。才华横溢，多愁善感。与宝玉相爱却因家族反对终未能成婚，泪尽而逝。", "薛宝钗": "薛宝钗，金陵十二钗之一。薛姨妈之女，拥有金锁。端庄稳重，博学多才，深得贾府上下喜爱。最终嫁给宝玉，但宝玉出家后独守空闺。", "贾元春": "贾元春，金陵十二钗之一。贾政长女，入宫为妃。省亲时大观园即为其省亲别墅而建。最终在宫中去世（据推猜死于政治斗争）。", "贾探春": "贾探春，金陵十二钗之一。贾政庶女，精明能干，有男子之气概。曾代理管家，兴利除弊。后被远嫁海疆。", "史湘云": "史湘云，金陵十二钗之一。贾母娘家侄孙女，性格豪爽，英气勃勃，心直口快。与宝玉为好友。最终史家败落后流落。", "妙玉": "妙玉，金陵十二钗之一。出身仕宦之家，因自幼多病入空门带发修行。寄居大观园栊翠庵，孤傲洁癖。最终被强盗掳走。", "贾迎春": "贾迎春，金陵十二钗之一。贾赦之女，性格懦弱，被称为\"二木头\"。嫁与孙绍祖后受尽虐待，一年后便去世。", "贾惜春": "贾惜春，金陵十二钗之一。贾珍之妹，性格孤僻冷漠。见家族衰败后看破红尘，削发为尼。", "王熙凤": "王熙凤，金陵十二钗之一。贾琏之妻，荣国府实际管家人。精明强干，心狠手辣，人称\"凤辣子\"。弄权铁槛寺，逼死尤二姐等。最终被休后病死狱中。", "巧姐": "巧姐，金陵十二钗之一。王熙凤之女。贾府败落后险被卖入烟花之地，后被刘姥姥救出，嫁入乡间。", "李纨": "李纨，金陵十二钗之一。贾珠之妻，贾兰之母。年轻守寡，一心教子。性格温和，与世无争。最终贾兰中举后受封诰命，不久去世。", "秦可卿": "秦可卿，金陵十二钗之一。贾蓉之妻，生得袅娜纤巧兼鲜艳妩媚。因与公公贾珍有染，羞愤自缢（一说病逝）。", "贾母": "贾母，人称史太君。荣国公长子贾代善之妻，贾府最高辈分。慈祥和蔼，疼爱孙辈，是贾府的定海神针。家族败落后去世。", "贾政": "贾政，字存周。荣国府贾代善次子，贾宝玉之父。为人古板严肃，醉心仕途。对宝玉管教严厉。", "王夫人": "王夫人，贾政正妻，贾宝玉之母。王子腾之妹，薛姨妈之姐。表面慈善，实则手腕强硬。逼死金钏、晴雯等。", "贾赦": "贾赦，字恩侯。荣国府贾代善长子，袭一等将军之职。好色享乐，强纳鸳鸯为妾不成。最终被革职抄家。", "邢夫人": "邢夫人，贾赦续弦。性格懦弱，一味顺从贾赦，在贾府地位尴尬。", "贾琏": "贾琏，贾赦之子，王熙凤之夫。好色风流，偷娶尤二姐。管理荣国府外务。", "贾珍": "贾珍，宁国府贾敬之子，袭三等威烈将军。荒淫无度，与儿媳秦可卿有私情。", "尤氏": "尤氏，贾珍续弦，宁国府当家奶奶。性格软弱，对贾珍的荒唐无能为力。", "贾蓉": "贾蓉，贾珍之子，秦可卿之夫。好色，与王熙凤有暧昧。", "贾蔷": "贾蔷，宁国府近支子弟，与贾蓉关系好。管理大观园戏班。", "贾芸": "贾芸，贾府远族，认贾宝玉为父。后与小红相爱。", "贾环": "贾环，贾政庶子，探春同父异母弟。性情猥琐，嫉妒宝玉。", "贾兰": "贾兰，贾珠与李纨之子。好学上进，最终科举中第。", "贾瑞": "贾瑞，贾府远房子弟。贪恋王熙凤美色，被王熙凤设局整死。", "秦钟": "秦钟，秦可卿之弟，贾宝玉好友。白净俊秀，与智能儿有私情。后病死。", "薛蟠": "薛蟠，薛姨妈之子，薛宝钗之兄。\"呆霸王\"，打死冯渊抢走香菱。性情粗鲁。", "薛姨妈": "薛姨妈，王夫人之妹，薛家当家。携儿女进京住进贾府。", "薛宝琴": "薛宝琴，薛蝌之妹，容貌出众，贾母极为喜爱。许配梅翰林之子。", "邢岫烟": "邢岫烟，邢夫人侄女，家境贫寒。后嫁薛蝌。", "尤二姐": "尤二姐，尤氏继母之女。美貌温柔，被贾琏偷娶为妾。被王熙凤设计逼死。", "尤三姐": "尤三姐，尤二姐之妹，刚烈泼辣。钟情柳湘莲，柳湘莲因疑其不洁退婚，尤三姐自刎以明志。", "袭人": "袭人，原名花珍珠，贾宝玉大丫鬟。温柔贤淑，忠心耿耿。宝玉出家后嫁蒋玉菡。", "晴雯": "晴雯，贾宝玉丫鬟，金陵十二钗又副册之首。容貌出众，性格刚烈。被王夫人赶出大观园后病死。", "麝月": "麝月，贾宝玉丫鬟，温和稳重，被认为是袭人的影子。", "秋纹": "秋纹，贾宝玉丫鬟。", "碧痕": "碧痕，贾宝玉丫鬟，曾服侍宝玉洗澡。", "紫鹃": "紫鹃，原名鹦哥，林黛玉丫鬟。忠心耿耿，黛玉死后看破世事。", "雪雁": "雪雁，林黛玉从苏州带来的小丫鬟。", "莺儿": "莺儿，薛宝钗丫鬟。", "香菱": "香菱，原名甄英莲，甄士隐之女。自幼被拐卖，后被薛蟠纳为妾。向黛玉学诗，苦吟成痴。", "平儿": "平儿，王熙凤丫鬟兼通房丫头。善良聪慧，在凤姐和贾琏之间左右调停。", "鸳鸯": "鸳鸯，贾母大丫鬟。刚烈有志气，抗拒贾赦纳妾之命，发誓终身不嫁。贾母死后自缢。", "司棋": "司棋，贾迎春大丫鬟。与表弟潘又安相爱事发，被赶出大观园。后殉情。", "入画": "入画，贾惜春丫鬟。", "侍书": "侍书，贾探春丫鬟。", "抱琴": "抱琴，贾元春丫鬟，随元春入宫。", "小红": "小红，原名林红玉，怡红院丫鬟。伶俐有心计，后与贾芸相爱。", "坠儿": "坠儿，怡红院小丫鬟，因偷东西被晴雯赶出。", "金钏": "金钏，王夫人丫鬟。因与宝玉调笑被王夫人赶出，含羞跳井而死。", "玉钏": "玉钏，金钏之妹，后为王夫人丫鬟。", "彩云": "彩云，王夫人丫鬟，与贾环要好。", "彩霞": "彩霞，王夫人丫鬟。", "芳官": "芳官，大观园戏班正旦，后为宝玉丫鬟。性格活泼。", "藕官": "藕官，大观园戏班小生。", "蕊官": "蕊官，大观园戏班小旦。", "龄官": "龄官，大观园戏班正旦。容貌酷似黛玉，与贾蔷相恋。", "刘姥姥": "刘姥姥，乡下老妇。因女婿王狗儿与王家有旧，三进荣国府。幽默诙谐，深得贾母欢心。贾府败落后救出巧姐。", "赖大": "赖大，荣国府大管家。", "赖嬷嬷": "赖嬷嬷，赖大之母，贾府老仆。", "林之孝": "林之孝，荣国府管家，小红之父。", "林之孝家的": "林之孝之妻，荣国府女管家。", "周瑞": "周瑞，荣国府管家。", "周瑞家的": "周瑞之妻，王夫人陪房。", "吴新登": "吴新登，荣国府账房总管。", "焦大": "焦大，宁国府老仆。从小跟宁国公打仗，曾救过主子性命。因醉酒骂主被塞了一嘴马粪。", "王善保家的": "王善保家的，邢夫人陪房。抄检大观园的主谋之一。", "柳嫂子": "柳嫂子，大观园厨房女厨。", "甄士隐": "甄士隐，乡绅，甄英莲（香菱）之父。爱女被拐、家宅被烧后遭世态炎凉，随跛足道人出家。", "贾雨村": "贾雨村，穷书生出身，后中进士做官。曾为林黛玉之师，帮助贾府处理官司。忘恩负义，贾府败落后落井下石。", "林如海": "林如海，林黛玉之父，巡盐御史。病逝扬州。", "甄宝玉": "甄宝玉，金陵甄家之子，与贾宝玉同名同貌，性格却完全相反，醉心功名。", "北静王": "北静王水溶，贾府世交。赠送宝玉鹡鸰香串。", "柳湘莲": "柳湘莲，世家子弟，性格豪爽文武双全。与尤三姐定亲后退婚，三姐自刎后出家。", "蒋玉菡": "蒋玉菡，戏子，艺名琪官。与宝玉互赠汗巾。后娶袭人为妻。", "贾敬": "贾敬，宁国府贾代化之子，贾珍之父。一心想成仙，在玄真观烧丹炼汞而死。", "贾代儒": "贾代儒，贾府族中塾师，贾瑞之祖父。", "马道婆": "马道婆，巫婆。受赵姨娘之托用魇魔法害宝玉和王熙凤。", "赵姨娘": "赵姨娘，贾政之妾，探春、贾环之母。阴险毒辣，指使马道婆害宝玉凤姐。", "甄士隐（二）": "见甄士隐。", "冷子兴": "冷子兴，古董商，周瑞女婿。演说荣国府。", "门子": "门子，应天府小吏，原为葫芦庙小沙弥。为贾雨村出主意处理薛蟠案。", "跛足道人": "跛足道人，癞头和尚的搭档。度化甄士隐和柳湘莲出家。", "癞头和尚": "癞头和尚，蓬头垢面却非凡人。曾想度化黛玉出家，给宝钗金锁配吉利话。", "空空道人": "空空道人，将《石头记》抄录传世。见大荒山无稽崖青埂峰下石头所记故事，录之曰《红楼梦》。", "警幻仙姑": "警幻仙姑，太虚幻境之主。曾带贾宝玉游历太虚幻境，展示金陵十二钗判词。", "贾芹": "贾芹，贾府远族，管理大观园小道士小尼姑。", "贾敷": "贾敷，贾代化长子，早夭。", "贾代善": "贾代善，荣国公之子，贾母之夫。已故。", "贾代化": "贾代化，宁国府贾演之子，贾敬之父。", "贾演": "贾演，宁国公，宁国府始祖。", "贾源": "贾源，荣国公，荣国府始祖。", "贾菌": "贾菌，贾府远族，贾兰塾中同窗。", "王仁": "王仁，王熙凤之兄。巧姐的舅舅，品行恶劣。", "王子腾": "王子腾，王夫人薛姨妈之兄，京营节度使。四大家族核心人物。", "乌进孝": "乌进孝，宁国府皇粮庄头，每年进贡。", "张道士": "张道士，荣国公替身（代出家道士），贾府老关系。", "智能儿": "智能儿，馒头庵小尼姑，与秦钟有私情。", "净虚": "净虚，馒头庵老尼。求王熙凤拆散张金哥婚事，王熙凤弄权铁槛寺便由此起。", "夏金桂": "夏金桂，薛蟠之妻。河东狮，泼辣善妒。欲毒死香菱反毒死自己。", "秋桐": "秋桐，贾琏之妾，原是贾赦房中人。与王熙凤合谋欺辱尤二姐。", "鲍二家的": "鲍二家的，贾府仆妇。与贾琏私通被王熙凤撞见，后羞愤自缢。", "多姑娘": "多姑娘，贾府女仆。晴雯的表嫂，容貌风流。", "赵国基": "赵国基，赵姨娘之弟，贾环之舅。", "贾琮": "贾琮，贾赦之子，年幼。", "焙茗": "焙茗，贾宝玉贴身小厮。", "锄药": "锄药，贾宝玉小厮。", "墨雨": "墨雨，贾宝玉小厮。", "扫红": "扫红，贾宝玉小厮。", "双瑞": "双瑞，贾宝玉小厮。", "李贵": "李贵，贾宝玉奶兄，伴读。", "绣橘": "绣橘，贾迎春丫鬟。", "莲花儿": "莲花儿，贾迎春丫鬟。", "葵官": "葵官，大观园戏班丑角。", "豆官": "豆官，大观园戏班。", "艾官": "艾官，大观园戏班。", "茄官": "茄官，大观园戏班。", "宝官": "宝官，大观园戏班。", "玉官": "玉官，大观园戏班。", "药官": "药官，大观园戏班，与藕官有情。", "庆儿": "庆儿，王熙凤小厮。", "来旺": "来旺，王熙凤手下，放高利贷。", "来旺媳妇": "来旺媳妇，王熙凤心腹。", "兴儿": "兴儿，贾琏小厮。", "翠缕": "翠缕，史湘云丫鬟。", "琥珀": "琥珀，贾母丫鬟。", "翡翠": "翡翠，贾母丫鬟。", "玻璃": "玻璃，贾母丫鬟。", "丰儿": "丰儿，王熙凤丫鬟。", "善姐": "善姐，王熙凤派去伺候尤二姐的丫鬟。实际是欺负尤二姐。", "素云": "素云，李纨丫鬟。", "碧月": "碧月，李纨丫鬟。", "封肃": "封肃，甄士隐之岳父，势利小人。", "娇杏": "娇杏，甄家丫鬟。回头看贾雨村一眼，后被贾雨村娶为正妻。", "霍启": "霍启，甄士隐家仆。元宵节丢失甄英莲。", "孙绍祖": "孙绍祖，贾迎春之夫。暴虐好色，迎春嫁过去一年便被他折磨致死。"}Z;
var HLL={"贾宝玉": "贾宝玉，荣国府贾政之子，衔通灵宝玉而生。全书男主角，前身为神瑛侍者。性情温柔，厌恶仕途经济，独钟情于林黛玉。最终在家族败落后悬崖撒手，出家为僧。", "林黛玉": "林黛玉，金陵十二钗之首，字颦颦。前身为绛珠仙草，为还神瑛侍者（宝玉）的灌溉之恩下凡。才华横溢，多愁善感。与宝玉相爱却因家族反对终未能成婚，泪尽而逝。", "薛宝钗": "薛宝钗，金陵十二钗之一。薛姨妈之女，拥有金锁。端庄稳重，博学多才，深得贾府上下喜爱。最终嫁给宝玉，但宝玉出家后独守空闺。", "贾元春": "贾元春，金陵十二钗之一。贾政长女，入宫为妃。省亲时大观园即为其省亲别墅而建。最终在宫中去世（据推猜死于政治斗争）。", "贾探春": "贾探春，金陵十二钗之一。贾政庶女，精明能干，有男子之气概。曾代理管家，兴利除弊。后被远嫁海疆。", "史湘云": "史湘云，金陵十二钗之一。贾母娘家侄孙女，性格豪爽，英气勃勃，心直口快。与宝玉为好友。最终史家败落后流落。", "妙玉": "妙玉，金陵十二钗之一。出身仕宦之家，因自幼多病入空门带发修行。寄居大观园栊翠庵，孤傲洁癖。最终被强盗掳走。", "贾迎春": "贾迎春，金陵十二钗之一。贾赦之女，性格懦弱，被称为\"二木头\"。嫁与孙绍祖后受尽虐待，一年后便去世。", "贾惜春": "贾惜春，金陵十二钗之一。贾珍之妹，性格孤僻冷漠。见家族衰败后看破红尘，削发为尼。", "王熙凤": "王熙凤，金陵十二钗之一。贾琏之妻，荣国府实际管家人。精明强干，心狠手辣，人称\"凤辣子\"。弄权铁槛寺，逼死尤二姐等。最终被休后病死狱中。", "巧姐": "巧姐，金陵十二钗之一。王熙凤之女。贾府败落后险被卖入烟花之地，后被刘姥姥救出，嫁入乡间。", "李纨": "李纨，金陵十二钗之一。贾珠之妻，贾兰之母。年轻守寡，一心教子。性格温和，与世无争。最终贾兰中举后受封诰命，不久去世。", "秦可卿": "秦可卿，金陵十二钗之一。贾蓉之妻，生得袅娜纤巧兼鲜艳妩媚。因与公公贾珍有染，羞愤自缢（一说病逝）。", "贾母": "贾母，人称史太君。荣国公长子贾代善之妻，贾府最高辈分。慈祥和蔼，疼爱孙辈，是贾府的定海神针。家族败落后去世。", "贾政": "贾政，字存周。荣国府贾代善次子，贾宝玉之父。为人古板严肃，醉心仕途。对宝玉管教严厉。", "王夫人": "王夫人，贾政正妻，贾宝玉之母。王子腾之妹，薛姨妈之姐。表面慈善，实则手腕强硬。逼死金钏、晴雯等。", "贾赦": "贾赦，字恩侯。荣国府贾代善长子，袭一等将军之职。好色享乐，强纳鸳鸯为妾不成。最终被革职抄家。", "邢夫人": "邢夫人，贾赦续弦。性格懦弱，一味顺从贾赦，在贾府地位尴尬。", "贾琏": "贾琏，贾赦之子，王熙凤之夫。好色风流，偷娶尤二姐。管理荣国府外务。", "贾珍": "贾珍，宁国府贾敬之子，袭三等威烈将军。荒淫无度，与儿媳秦可卿有私情。", "尤氏": "尤氏，贾珍续弦，宁国府当家奶奶。性格软弱，对贾珍的荒唐无能为力。", "贾蓉": "贾蓉，贾珍之子，秦可卿之夫。好色，与王熙凤有暧昧。", "贾蔷": "贾蔷，宁国府近支子弟，与贾蓉关系好。管理大观园戏班。", "贾芸": "贾芸，贾府远族，认贾宝玉为父。后与小红相爱。", "贾环": "贾环，贾政庶子，探春同父异母弟。性情猥琐，嫉妒宝玉。", "贾兰": "贾兰，贾珠与李纨之子。好学上进，最终科举中第。", "贾瑞": "贾瑞，贾府远房子弟。贪恋王熙凤美色，被王熙凤设局整死。", "秦钟": "秦钟，秦可卿之弟，贾宝玉好友。白净俊秀，与智能儿有私情。后病死。", "薛蟠": "薛蟠，薛姨妈之子，薛宝钗之兄。\"呆霸王\"，打死冯渊抢走香菱。性情粗鲁。", "薛姨妈": "薛姨妈，王夫人之妹，薛家当家。携儿女进京住进贾府。", "薛宝琴": "薛宝琴，薛蝌之妹，容貌出众，贾母极为喜爱。许配梅翰林之子。", "邢岫烟": "邢岫烟，邢夫人侄女，家境贫寒。后嫁薛蝌。", "尤二姐": "尤二姐，尤氏继母之女。美貌温柔，被贾琏偷娶为妾。被王熙凤设计逼死。", "尤三姐": "尤三姐，尤二姐之妹，刚烈泼辣。钟情柳湘莲，柳湘莲因疑其不洁退婚，尤三姐自刎以明志。", "袭人": "袭人，原名花珍珠，贾宝玉大丫鬟。温柔贤淑，忠心耿耿。宝玉出家后嫁蒋玉菡。", "晴雯": "晴雯，贾宝玉丫鬟，金陵十二钗又副册之首。容貌出众，性格刚烈。被王夫人赶出大观园后病死。", "麝月": "麝月，贾宝玉丫鬟，温和稳重，被认为是袭人的影子。", "秋纹": "秋纹，贾宝玉丫鬟。", "碧痕": "碧痕，贾宝玉丫鬟，曾服侍宝玉洗澡。", "紫鹃": "紫鹃，原名鹦哥，林黛玉丫鬟。忠心耿耿，黛玉死后看破世事。", "雪雁": "雪雁，林黛玉从苏州带来的小丫鬟。", "莺儿": "莺儿，薛宝钗丫鬟。", "香菱": "香菱，原名甄英莲，甄士隐之女。自幼被拐卖，后被薛蟠纳为妾。向黛玉学诗，苦吟成痴。", "平儿": "平儿，王熙凤丫鬟兼通房丫头。善良聪慧，在凤姐和贾琏之间左右调停。", "鸳鸯": "鸳鸯，贾母大丫鬟。刚烈有志气，抗拒贾赦纳妾之命，发誓终身不嫁。贾母死后自缢。", "司棋": "司棋，贾迎春大丫鬟。与表弟潘又安相爱事发，被赶出大观园。后殉情。", "入画": "入画，贾惜春丫鬟。", "侍书": "侍书，贾探春丫鬟。", "抱琴": "抱琴，贾元春丫鬟，随元春入宫。", "小红": "小红，原名林红玉，怡红院丫鬟。伶俐有心计，后与贾芸相爱。", "坠儿": "坠儿，怡红院小丫鬟，因偷东西被晴雯赶出。", "金钏": "金钏，王夫人丫鬟。因与宝玉调笑被王夫人赶出，含羞跳井而死。", "玉钏": "玉钏，金钏之妹，后为王夫人丫鬟。", "彩云": "彩云，王夫人丫鬟，与贾环要好。", "彩霞": "彩霞，王夫人丫鬟。", "芳官": "芳官，大观园戏班正旦，后为宝玉丫鬟。性格活泼。", "藕官": "藕官，大观园戏班小生。", "蕊官": "蕊官，大观园戏班小旦。", "龄官": "龄官，大观园戏班正旦。容貌酷似黛玉，与贾蔷相恋。", "刘姥姥": "刘姥姥，乡下老妇。因女婿王狗儿与王家有旧，三进荣国府。幽默诙谐，深得贾母欢心。贾府败落后救出巧姐。", "赖大": "赖大，荣国府大管家。", "赖嬷嬷": "赖嬷嬷，赖大之母，贾府老仆。", "林之孝": "林之孝，荣国府管家，小红之父。", "林之孝家的": "林之孝之妻，荣国府女管家。", "周瑞": "周瑞，荣国府管家。", "周瑞家的": "周瑞之妻，王夫人陪房。", "吴新登": "吴新登，荣国府账房总管。", "焦大": "焦大，宁国府老仆。从小跟宁国公打仗，曾救过主子性命。因醉酒骂主被塞了一嘴马粪。", "王善保家的": "王善保家的，邢夫人陪房。抄检大观园的主谋之一。", "柳嫂子": "柳嫂子，大观园厨房女厨。", "甄士隐": "甄士隐，乡绅，甄英莲（香菱）之父。爱女被拐、家宅被烧后遭世态炎凉，随跛足道人出家。", "贾雨村": "贾雨村，穷书生出身，后中进士做官。曾为林黛玉之师，帮助贾府处理官司。忘恩负义，贾府败落后落井下石。", "林如海": "林如海，林黛玉之父，巡盐御史。病逝扬州。", "甄宝玉": "甄宝玉，金陵甄家之子，与贾宝玉同名同貌，性格却完全相反，醉心功名。", "北静王": "北静王水溶，贾府世交。赠送宝玉鹡鸰香串。", "柳湘莲": "柳湘莲，世家子弟，性格豪爽文武双全。与尤三姐定亲后退婚，三姐自刎后出家。", "蒋玉菡": "蒋玉菡，戏子，艺名琪官。与宝玉互赠汗巾。后娶袭人为妻。", "贾敬": "贾敬，宁国府贾代化之子，贾珍之父。一心想成仙，在玄真观烧丹炼汞而死。", "贾代儒": "贾代儒，贾府族中塾师，贾瑞之祖父。", "马道婆": "马道婆，巫婆。受赵姨娘之托用魇魔法害宝玉和王熙凤。", "赵姨娘": "赵姨娘，贾政之妾，探春、贾环之母。阴险毒辣，指使马道婆害宝玉凤姐。", "甄士隐（二）": "见甄士隐。", "冷子兴": "冷子兴，古董商，周瑞女婿。演说荣国府。", "门子": "门子，应天府小吏，原为葫芦庙小沙弥。为贾雨村出主意处理薛蟠案。", "跛足道人": "跛足道人，癞头和尚的搭档。度化甄士隐和柳湘莲出家。", "癞头和尚": "癞头和尚，蓬头垢面却非凡人。曾想度化黛玉出家，给宝钗金锁配吉利话。", "空空道人": "空空道人，将《石头记》抄录传世。见大荒山无稽崖青埂峰下石头所记故事，录之曰《红楼梦》。", "警幻仙姑": "警幻仙姑，太虚幻境之主。曾带贾宝玉游历太虚幻境，展示金陵十二钗判词。", "贾芹": "贾芹，贾府远族，管理大观园小道士小尼姑。", "贾敷": "贾敷，贾代化长子，早夭。", "贾代善": "贾代善，荣国公之子，贾母之夫。已故。", "贾代化": "贾代化，宁国府贾演之子，贾敬之父。", "贾演": "贾演，宁国公，宁国府始祖。", "贾源": "贾源，荣国公，荣国府始祖。", "贾菌": "贾菌，贾府远族，贾兰塾中同窗。", "王仁": "王仁，王熙凤之兄。巧姐的舅舅，品行恶劣。", "王子腾": "王子腾，王夫人薛姨妈之兄，京营节度使。四大家族核心人物。", "乌进孝": "乌进孝，宁国府皇粮庄头，每年进贡。", "张道士": "张道士，荣国公替身（代出家道士），贾府老关系。", "智能儿": "智能儿，馒头庵小尼姑，与秦钟有私情。", "净虚": "净虚，馒头庵老尼。求王熙凤拆散张金哥婚事，王熙凤弄权铁槛寺便由此起。", "夏金桂": "夏金桂，薛蟠之妻。河东狮，泼辣善妒。欲毒死香菱反毒死自己。", "秋桐": "秋桐，贾琏之妾，原是贾赦房中人。与王熙凤合谋欺辱尤二姐。", "鲍二家的": "鲍二家的，贾府仆妇。与贾琏私通被王熙凤撞见，后羞愤自缢。", "多姑娘": "多姑娘，贾府女仆。晴雯的表嫂，容貌风流。", "赵国基": "赵国基，赵姨娘之弟，贾环之舅。", "贾琮": "贾琮，贾赦之子，年幼。", "焙茗": "焙茗，贾宝玉贴身小厮。", "锄药": "锄药，贾宝玉小厮。", "墨雨": "墨雨，贾宝玉小厮。", "扫红": "扫红，贾宝玉小厮。", "双瑞": "双瑞，贾宝玉小厮。", "李贵": "李贵，贾宝玉奶兄，伴读。", "绣橘": "绣橘，贾迎春丫鬟。", "莲花儿": "莲花儿，贾迎春丫鬟。", "葵官": "葵官，大观园戏班丑角。", "豆官": "豆官，大观园戏班。", "艾官": "艾官，大观园戏班。", "茄官": "茄官，大观园戏班。", "宝官": "宝官，大观园戏班。", "玉官": "玉官，大观园戏班。", "药官": "药官，大观园戏班，与藕官有情。", "庆儿": "庆儿，王熙凤小厮。", "来旺": "来旺，王熙凤手下，放高利贷。", "来旺媳妇": "来旺媳妇，王熙凤心腹。", "兴儿": "兴儿，贾琏小厮。", "翠缕": "翠缕，史湘云丫鬟。", "琥珀": "琥珀，贾母丫鬟。", "翡翠": "翡翠，贾母丫鬟。", "玻璃": "玻璃，贾母丫鬟。", "丰儿": "丰儿，王熙凤丫鬟。", "善姐": "善姐，王熙凤派去伺候尤二姐的丫鬟。实际是欺负尤二姐。", "素云": "素云，李纨丫鬟。", "碧月": "碧月，李纨丫鬟。", "封肃": "封肃，甄士隐之岳父，势利小人。", "娇杏": "娇杏，甄家丫鬟。回头看贾雨村一眼，后被贾雨村娶为正妻。", "霍启": "霍启，甄士隐家仆。元宵节丢失甄英莲。", "孙绍祖": "孙绍祖，贾迎春之夫。暴虐好色，迎春嫁过去一年便被他折磨致死。"}L;
var HLM={"贾宝玉": "贾宝玉，荣国府贾政之子，衔通灵宝玉而生。全书男主角，前身为神瑛侍者。性情温柔，厌恶仕途经济，独钟情于林黛玉。最终在家族败落后悬崖撒手，出家为僧。", "林黛玉": "林黛玉，金陵十二钗之首，字颦颦。前身为绛珠仙草，为还神瑛侍者（宝玉）的灌溉之恩下凡。才华横溢，多愁善感。与宝玉相爱却因家族反对终未能成婚，泪尽而逝。", "薛宝钗": "薛宝钗，金陵十二钗之一。薛姨妈之女，拥有金锁。端庄稳重，博学多才，深得贾府上下喜爱。最终嫁给宝玉，但宝玉出家后独守空闺。", "贾元春": "贾元春，金陵十二钗之一。贾政长女，入宫为妃。省亲时大观园即为其省亲别墅而建。最终在宫中去世（据推猜死于政治斗争）。", "贾探春": "贾探春，金陵十二钗之一。贾政庶女，精明能干，有男子之气概。曾代理管家，兴利除弊。后被远嫁海疆。", "史湘云": "史湘云，金陵十二钗之一。贾母娘家侄孙女，性格豪爽，英气勃勃，心直口快。与宝玉为好友。最终史家败落后流落。", "妙玉": "妙玉，金陵十二钗之一。出身仕宦之家，因自幼多病入空门带发修行。寄居大观园栊翠庵，孤傲洁癖。最终被强盗掳走。", "贾迎春": "贾迎春，金陵十二钗之一。贾赦之女，性格懦弱，被称为\"二木头\"。嫁与孙绍祖后受尽虐待，一年后便去世。", "贾惜春": "贾惜春，金陵十二钗之一。贾珍之妹，性格孤僻冷漠。见家族衰败后看破红尘，削发为尼。", "王熙凤": "王熙凤，金陵十二钗之一。贾琏之妻，荣国府实际管家人。精明强干，心狠手辣，人称\"凤辣子\"。弄权铁槛寺，逼死尤二姐等。最终被休后病死狱中。", "巧姐": "巧姐，金陵十二钗之一。王熙凤之女。贾府败落后险被卖入烟花之地，后被刘姥姥救出，嫁入乡间。", "李纨": "李纨，金陵十二钗之一。贾珠之妻，贾兰之母。年轻守寡，一心教子。性格温和，与世无争。最终贾兰中举后受封诰命，不久去世。", "秦可卿": "秦可卿，金陵十二钗之一。贾蓉之妻，生得袅娜纤巧兼鲜艳妩媚。因与公公贾珍有染，羞愤自缢（一说病逝）。", "贾母": "贾母，人称史太君。荣国公长子贾代善之妻，贾府最高辈分。慈祥和蔼，疼爱孙辈，是贾府的定海神针。家族败落后去世。", "贾政": "贾政，字存周。荣国府贾代善次子，贾宝玉之父。为人古板严肃，醉心仕途。对宝玉管教严厉。", "王夫人": "王夫人，贾政正妻，贾宝玉之母。王子腾之妹，薛姨妈之姐。表面慈善，实则手腕强硬。逼死金钏、晴雯等。", "贾赦": "贾赦，字恩侯。荣国府贾代善长子，袭一等将军之职。好色享乐，强纳鸳鸯为妾不成。最终被革职抄家。", "邢夫人": "邢夫人，贾赦续弦。性格懦弱，一味顺从贾赦，在贾府地位尴尬。", "贾琏": "贾琏，贾赦之子，王熙凤之夫。好色风流，偷娶尤二姐。管理荣国府外务。", "贾珍": "贾珍，宁国府贾敬之子，袭三等威烈将军。荒淫无度，与儿媳秦可卿有私情。", "尤氏": "尤氏，贾珍续弦，宁国府当家奶奶。性格软弱，对贾珍的荒唐无能为力。", "贾蓉": "贾蓉，贾珍之子，秦可卿之夫。好色，与王熙凤有暧昧。", "贾蔷": "贾蔷，宁国府近支子弟，与贾蓉关系好。管理大观园戏班。", "贾芸": "贾芸，贾府远族，认贾宝玉为父。后与小红相爱。", "贾环": "贾环，贾政庶子，探春同父异母弟。性情猥琐，嫉妒宝玉。", "贾兰": "贾兰，贾珠与李纨之子。好学上进，最终科举中第。", "贾瑞": "贾瑞，贾府远房子弟。贪恋王熙凤美色，被王熙凤设局整死。", "秦钟": "秦钟，秦可卿之弟，贾宝玉好友。白净俊秀，与智能儿有私情。后病死。", "薛蟠": "薛蟠，薛姨妈之子，薛宝钗之兄。\"呆霸王\"，打死冯渊抢走香菱。性情粗鲁。", "薛姨妈": "薛姨妈，王夫人之妹，薛家当家。携儿女进京住进贾府。", "薛宝琴": "薛宝琴，薛蝌之妹，容貌出众，贾母极为喜爱。许配梅翰林之子。", "邢岫烟": "邢岫烟，邢夫人侄女，家境贫寒。后嫁薛蝌。", "尤二姐": "尤二姐，尤氏继母之女。美貌温柔，被贾琏偷娶为妾。被王熙凤设计逼死。", "尤三姐": "尤三姐，尤二姐之妹，刚烈泼辣。钟情柳湘莲，柳湘莲因疑其不洁退婚，尤三姐自刎以明志。", "袭人": "袭人，原名花珍珠，贾宝玉大丫鬟。温柔贤淑，忠心耿耿。宝玉出家后嫁蒋玉菡。", "晴雯": "晴雯，贾宝玉丫鬟，金陵十二钗又副册之首。容貌出众，性格刚烈。被王夫人赶出大观园后病死。", "麝月": "麝月，贾宝玉丫鬟，温和稳重，被认为是袭人的影子。", "秋纹": "秋纹，贾宝玉丫鬟。", "碧痕": "碧痕，贾宝玉丫鬟，曾服侍宝玉洗澡。", "紫鹃": "紫鹃，原名鹦哥，林黛玉丫鬟。忠心耿耿，黛玉死后看破世事。", "雪雁": "雪雁，林黛玉从苏州带来的小丫鬟。", "莺儿": "莺儿，薛宝钗丫鬟。", "香菱": "香菱，原名甄英莲，甄士隐之女。自幼被拐卖，后被薛蟠纳为妾。向黛玉学诗，苦吟成痴。", "平儿": "平儿，王熙凤丫鬟兼通房丫头。善良聪慧，在凤姐和贾琏之间左右调停。", "鸳鸯": "鸳鸯，贾母大丫鬟。刚烈有志气，抗拒贾赦纳妾之命，发誓终身不嫁。贾母死后自缢。", "司棋": "司棋，贾迎春大丫鬟。与表弟潘又安相爱事发，被赶出大观园。后殉情。", "入画": "入画，贾惜春丫鬟。", "侍书": "侍书，贾探春丫鬟。", "抱琴": "抱琴，贾元春丫鬟，随元春入宫。", "小红": "小红，原名林红玉，怡红院丫鬟。伶俐有心计，后与贾芸相爱。", "坠儿": "坠儿，怡红院小丫鬟，因偷东西被晴雯赶出。", "金钏": "金钏，王夫人丫鬟。因与宝玉调笑被王夫人赶出，含羞跳井而死。", "玉钏": "玉钏，金钏之妹，后为王夫人丫鬟。", "彩云": "彩云，王夫人丫鬟，与贾环要好。", "彩霞": "彩霞，王夫人丫鬟。", "芳官": "芳官，大观园戏班正旦，后为宝玉丫鬟。性格活泼。", "藕官": "藕官，大观园戏班小生。", "蕊官": "蕊官，大观园戏班小旦。", "龄官": "龄官，大观园戏班正旦。容貌酷似黛玉，与贾蔷相恋。", "刘姥姥": "刘姥姥，乡下老妇。因女婿王狗儿与王家有旧，三进荣国府。幽默诙谐，深得贾母欢心。贾府败落后救出巧姐。", "赖大": "赖大，荣国府大管家。", "赖嬷嬷": "赖嬷嬷，赖大之母，贾府老仆。", "林之孝": "林之孝，荣国府管家，小红之父。", "林之孝家的": "林之孝之妻，荣国府女管家。", "周瑞": "周瑞，荣国府管家。", "周瑞家的": "周瑞之妻，王夫人陪房。", "吴新登": "吴新登，荣国府账房总管。", "焦大": "焦大，宁国府老仆。从小跟宁国公打仗，曾救过主子性命。因醉酒骂主被塞了一嘴马粪。", "王善保家的": "王善保家的，邢夫人陪房。抄检大观园的主谋之一。", "柳嫂子": "柳嫂子，大观园厨房女厨。", "甄士隐": "甄士隐，乡绅，甄英莲（香菱）之父。爱女被拐、家宅被烧后遭世态炎凉，随跛足道人出家。", "贾雨村": "贾雨村，穷书生出身，后中进士做官。曾为林黛玉之师，帮助贾府处理官司。忘恩负义，贾府败落后落井下石。", "林如海": "林如海，林黛玉之父，巡盐御史。病逝扬州。", "甄宝玉": "甄宝玉，金陵甄家之子，与贾宝玉同名同貌，性格却完全相反，醉心功名。", "北静王": "北静王水溶，贾府世交。赠送宝玉鹡鸰香串。", "柳湘莲": "柳湘莲，世家子弟，性格豪爽文武双全。与尤三姐定亲后退婚，三姐自刎后出家。", "蒋玉菡": "蒋玉菡，戏子，艺名琪官。与宝玉互赠汗巾。后娶袭人为妻。", "贾敬": "贾敬，宁国府贾代化之子，贾珍之父。一心想成仙，在玄真观烧丹炼汞而死。", "贾代儒": "贾代儒，贾府族中塾师，贾瑞之祖父。", "马道婆": "马道婆，巫婆。受赵姨娘之托用魇魔法害宝玉和王熙凤。", "赵姨娘": "赵姨娘，贾政之妾，探春、贾环之母。阴险毒辣，指使马道婆害宝玉凤姐。", "甄士隐（二）": "见甄士隐。", "冷子兴": "冷子兴，古董商，周瑞女婿。演说荣国府。", "门子": "门子，应天府小吏，原为葫芦庙小沙弥。为贾雨村出主意处理薛蟠案。", "跛足道人": "跛足道人，癞头和尚的搭档。度化甄士隐和柳湘莲出家。", "癞头和尚": "癞头和尚，蓬头垢面却非凡人。曾想度化黛玉出家，给宝钗金锁配吉利话。", "空空道人": "空空道人，将《石头记》抄录传世。见大荒山无稽崖青埂峰下石头所记故事，录之曰《红楼梦》。", "警幻仙姑": "警幻仙姑，太虚幻境之主。曾带贾宝玉游历太虚幻境，展示金陵十二钗判词。", "贾芹": "贾芹，贾府远族，管理大观园小道士小尼姑。", "贾敷": "贾敷，贾代化长子，早夭。", "贾代善": "贾代善，荣国公之子，贾母之夫。已故。", "贾代化": "贾代化，宁国府贾演之子，贾敬之父。", "贾演": "贾演，宁国公，宁国府始祖。", "贾源": "贾源，荣国公，荣国府始祖。", "贾菌": "贾菌，贾府远族，贾兰塾中同窗。", "王仁": "王仁，王熙凤之兄。巧姐的舅舅，品行恶劣。", "王子腾": "王子腾，王夫人薛姨妈之兄，京营节度使。四大家族核心人物。", "乌进孝": "乌进孝，宁国府皇粮庄头，每年进贡。", "张道士": "张道士，荣国公替身（代出家道士），贾府老关系。", "智能儿": "智能儿，馒头庵小尼姑，与秦钟有私情。", "净虚": "净虚，馒头庵老尼。求王熙凤拆散张金哥婚事，王熙凤弄权铁槛寺便由此起。", "夏金桂": "夏金桂，薛蟠之妻。河东狮，泼辣善妒。欲毒死香菱反毒死自己。", "秋桐": "秋桐，贾琏之妾，原是贾赦房中人。与王熙凤合谋欺辱尤二姐。", "鲍二家的": "鲍二家的，贾府仆妇。与贾琏私通被王熙凤撞见，后羞愤自缢。", "多姑娘": "多姑娘，贾府女仆。晴雯的表嫂，容貌风流。", "赵国基": "赵国基，赵姨娘之弟，贾环之舅。", "贾琮": "贾琮，贾赦之子，年幼。", "焙茗": "焙茗，贾宝玉贴身小厮。", "锄药": "锄药，贾宝玉小厮。", "墨雨": "墨雨，贾宝玉小厮。", "扫红": "扫红，贾宝玉小厮。", "双瑞": "双瑞，贾宝玉小厮。", "李贵": "李贵，贾宝玉奶兄，伴读。", "绣橘": "绣橘，贾迎春丫鬟。", "莲花儿": "莲花儿，贾迎春丫鬟。", "葵官": "葵官，大观园戏班丑角。", "豆官": "豆官，大观园戏班。", "艾官": "艾官，大观园戏班。", "茄官": "茄官，大观园戏班。", "宝官": "宝官，大观园戏班。", "玉官": "玉官，大观园戏班。", "药官": "药官，大观园戏班，与藕官有情。", "庆儿": "庆儿，王熙凤小厮。", "来旺": "来旺，王熙凤手下，放高利贷。", "来旺媳妇": "来旺媳妇，王熙凤心腹。", "兴儿": "兴儿，贾琏小厮。", "翠缕": "翠缕，史湘云丫鬟。", "琥珀": "琥珀，贾母丫鬟。", "翡翠": "翡翠，贾母丫鬟。", "玻璃": "玻璃，贾母丫鬟。", "丰儿": "丰儿，王熙凤丫鬟。", "善姐": "善姐，王熙凤派去伺候尤二姐的丫鬟。实际是欺负尤二姐。", "素云": "素云，李纨丫鬟。", "碧月": "碧月，李纨丫鬟。", "封肃": "封肃，甄士隐之岳父，势利小人。", "娇杏": "娇杏，甄家丫鬟。回头看贾雨村一眼，后被贾雨村娶为正妻。", "霍启": "霍启，甄士隐家仆。元宵节丢失甄英莲。", "孙绍祖": "孙绍祖，贾迎春之夫。暴虐好色，迎春嫁过去一年便被他折磨致死。"}M;
var ST={sanguo:'\u2014 \u82F1\u96C4\u5F80\u4E8B\uFF0C\u5C3D\u5728\u67E5\u8BE2 \u2014',shuihu:'\u2014 \u5FE0\u4E49\u5343\u79CB\uFF0C\u5FEB\u610F\u6069\u4EC7 \u2014',xiyou:'\u2014 \u8E0F\u5E73\u574E\u5777\u6210\u5927\u9053 \u2014',honglou:'\u2014 \u6EE1\u7EB8\u8352\u5510\u8A00\uFF0C\u4E00\u628A\u8F9B\u9178\u6CEA \u2014'};
var BM={sanguo:'\uD83C\uDFEE',shuihu:'\u2694\uFE0F',xiyou:'\uD83D\uDC35',honglou:'\uD83C\uDF38'};
var FL={sanguo:['\u5168\u90E8','\u8700\u6C49','\u66F9\u9B4F','\u4E1C\u5434','\u7FA4\u96C4'],shuihu:['\u5168\u90E8','\u4E09\u5341\u516D\u5929\u7F61','\u4E03\u5341\u4E8C\u5730\u715E','\u6218\u6B7B','\u75C5\u901D/\u5584\u7EC8','\u6D77\u5916'],xiyou:['\u5168\u90E8','\u4F5B/\u84A9\u8428','\u5929\u5EAD','\u5996\u9B54','\u51E1\u4EBA/\u5176\u4ED6'],honglou:['\u5168\u90E8','\u91D1\u9675\u5341\u4E8C\u94BA','\u8D3E\u5E9C\u4E3B\u5B50','\u4E2B\u9ACF\u4EC6\u4ECE','\u5176\u4ED6']};
var book='sanguo',filter='all';
function d(){return {sanguo:SG,shuihu:SH,xiyou:XY,honglou:HL}[book];}
function sw(b){
  book=b;filter='all';var dd=d();
  document.querySelectorAll('.book-tab').forEach(function(t){t.classList.toggle('active',t.textContent.includes(BM[b]));});
  document.getElementById('bookSubtitle').textContent=ST[b];
  document.getElementById('countBadge').textContent='\uFF08\u5171'+Object.keys(dd).length+'\u4F4D\uFF09';
  document.getElementById('filterTabs').innerHTML=FL[b].map(function(f){return '<span class=\"nav-tab '+(f===FL[b][0]?'active':'')+'\" onclick=\"fi(\''+f+'\')\">'+f+'</span>';}).join('');
  document.getElementById('heroInput').value='';document.getElementById('resultArea').classList.remove('show');
  rl();setTheme(b);playSwitch();
}
function fi(f){filter=f;document.querySelectorAll('#filterTabs .nav-tab').forEach(function(t){t.classList.toggle('active',t.textContent===f);});rl();playClick();}
function ft(){
  var dd=d(),all=Object.keys(dd);
  if(filter===FL[book][0])return all;
  if(book==='sanguo')return all.filter(function(_,i){return GT[i]===filter;});
  if(book==='shuihu'){
    if(filter===FL[book][1])return all.filter(function(x){return TG.indexOf(x)>=0;});
    if(filter===FL[book][2])return all.filter(function(x){return TG.indexOf(x)<0 && ['\u6653\u76D6','\u9AD8\u4FDF','\u8521\u4EAC','\u7AE5\u8D2F','\u5B8B\u5FBD\u5B97','\u738B\u8FDB'].indexOf(x)<0;});
    if(filter===FL[book][3])return all.filter(function(x){return ZS.indexOf(x)>=0;});
    if(filter===FL[book][4])return all.filter(function(x){return ZS.indexOf(x)<0 && ['\u7AE5\u5A01','\u7AE5\u76F2','\u674E\u4FCA'].indexOf(x)<0 && ['\u6653\u76D6','\u9AD8\u4FDF','\u8521\u4EAC','\u7AE5\u8D2F','\u5B8B\u5FBD\u5B97','\u738B\u8FDB'].indexOf(x)<0;});
    if(filter===FL[book][5])return ['\u674E\u4FCA','\u7AE5\u5A01','\u7AE5\u76F2'];
  }
  if(book==='xiyou'){
    if(filter===FL[book][1])return all.filter(function(x){return XYF.indexOf(x)>=0;});
    if(filter===FL[book][2])return all.filter(function(x){return XYH.indexOf(x)>=0;});
    if(filter===FL[book][3])return all.filter(function(x){return XYD.indexOf(x)>=0;});
    if(filter===FL[book][4])return all.filter(function(x){return XYF.indexOf(x)<0&&XYH.indexOf(x)<0&&XYD.indexOf(x)<0;});
  }
  if(book==='honglou'){
    if(filter===FL[book][1])return all.filter(function(x){return HLZ.indexOf(x)>=0;});
    if(filter===FL[book][2])return all.filter(function(x){return HLL.indexOf(x)>=0;});
    if(filter===FL[book][3])return all.filter(function(x){return HLM.indexOf(x)>=0;});
    if(filter===FL[book][4])return all.filter(function(x){return HLZ.indexOf(x)<0&&HLL.indexOf(x)<0&&HLM.indexOf(x)<0;});
  }
  return all;
}
function bg(n){
  var dd=d();
  if(book==='sanguo'){var i=Object.keys(dd).indexOf(n);return i>=0?GT[i]:'';}
  if(book==='shuihu')return TG.indexOf(n)>=0?'\u5929\u7F61\u661F':'\u5730\u715E\u661F';
  if(book==='xiyou'){if(XYF.indexOf(n)>=0)return'\u4F5B/\u84A9\u8428';if(XYH.indexOf(n)>=0)return'\u5929\u5EAD';if(XYD.indexOf(n)>=0)return'\u5996\u9B54';return'\u5176\u4ED6';}
  if(book==='honglou'){if(HLZ.indexOf(n)>=0)return'\u5341\u4E8C\u94BA';if(HLL.indexOf(n)>=0)return'\u4E3B\u5B50';if(HLM.indexOf(n)>=0)return'\u4E2B\u9ACF';return'\u5176\u4ED6';}
  return'';
}
function rl(){
  var dd=d(),na=ft();
  document.getElementById('heroList').innerHTML=na.length?na.map(function(x){return '<button class=\"hero-tag\" onclick=\"sr(\''+x.replace(/'/g,"\\'")+'\')\">'+x+'</button>';}).join(''):'<span style="color:#5a4a35">\uFF08\u65E0\u5339\u914D\u4EBA\u7269\uFF09</span>';
}
function sr(n){document.getElementById('heroInput').value=n;q();}
function q(){
  var a=document.getElementById('resultArea'),c=document.getElementById('resultContent'),n=document.getElementById('heroInput').value.trim();
  if(!n){a.classList.remove('show');return}
  a.classList.add('show');
  var dd=d(),s=dd[n];
  var tt={sanguo:'\u4E09\u56FD\u82F1\u96C4\u5F55',shuihu:'\u6C34\u6D52\u597D\u6C49\u5F55',xiyou:'\u897F\u6E38\u795E\u9B54\u5F55',honglou:'\u7EA2\u697C\u5B98\u4EBA\u5F55'};
  if(s){
    var b=bg(n);playQuery();
    c.innerHTML='<div class=\"hero-name\">'+n+(b?'<span class=\"badge\">'+b+'</span>':'')+'</div><div class=\"hero-story\">'+s+'</div>';
  }else{
    playNotFound();
    c.innerHTML='<div class=\"not-found\"><div class=\"icon\">\uD83D\uDCDC</div><p>\u300C'+n+'\u300D\u4E0D\u5728'+tt[book]+'\u4E2D</p><p style="margin-top:6px;font-size:16px;opacity:0.7">\u8BF7\u68C0\u67E5\u59D3\u540D\u662F\u5426\u8F93\u5165\u6B63\u786E</p></div>';
  }
}
// 初始化
document.getElementById('filterTabs').innerHTML=FL.sanguo.map(function(f){return '<span class=\"nav-tab '+(f===FL.sanguo[0]?'active':'')+'\" onclick=\"fi(\''+f+'\')\">'+f+'</span>';}).join('');
rl();document.getElementById('heroInput').focus();

</script>
